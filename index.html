function isH(d){const dt=new Date(d);dt.setHours(12);const day=dt.getDay();if(day===0||day===6)return true;return HOL.has(dt.toISOString().split('T')[0]);}
function wds(ds){if(!ds)return null;const s=new Date(ds);s.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);if(t<=s)return 0;let n=0,c=new Date(s);c.setDate(c.getDate()+1);while(c<=t){if(!isH(c))n++;c.setDate(c.getDate()+1);}return n;}
function dli(app){
  if(app.status==='posted')return{l:'Поставлено',t:'g'};
  if(app.status==='rejected')return{l:'Отклонено ФО',t:'r'};
  if(app.status==='control')return{l:'На контроле ФО',t:'b'};
  if(!app.date_gk||app.perv_bo==='Нет')return{l:'ДС (без срока ГК)',t:'n'};
  const d=wds(app.date_gk);
  if(d>=6)return{l:'Просрочено +'+(d-5)+' р.д.',t:'r'};
  if(d>=4)return{l:'Риск ('+(6-d)+' р.д.)',t:'y'};
  return{l:'В срок ('+(6-d)+' р.д.)',t:'g'};
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function bdg(l,t){const c={g:'bg',y:'by',r:'br',n:'bn',b:'bb'}[t]||'bn';return`<span class="badge ${c}">${esc(l)}</span>`;}
function dot(t){const c={g:'#16a34a',y:'#a16207',r:'#dc2626',n:'#9ca3af',b:'#1d4ed8'}[t]||'#9ca3af';return`<span class="dot" style="background:${c}"></span>`;}
function fmt(v){return v||'—';}
function fdt(iso){if(!iso)return'—';const d=new Date(iso);return d.toLocaleDateString('ru-RU')+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});}
function ni(){return new Date().toISOString();}
function tm(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function nn(){const a=getA();if(!a.length)return'1/'+YEAR;return(Math.max(...a.map(x=>parseInt(x.num)||0))+1)+'/'+YEAR;}
function ah(app,action,comment=''){if(!app.history)app.history=[];app.history.push({dt:ni(),user:CU.name,action,comment});}
function ini(n){return(n||'').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function top3(){const m=tm();return getU().filter(u=>u.role==='contract').map(u=>({u,n:getA().filter(a=>a.created_by===u.id&&(a.date_created||'').slice(0,7)===m).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n).slice(0,3);}

// Monthly stats
function monthStats(){
  const m=tm();const apps=getA();
  const thisM=apps.filter(a=>(a.date_created||'').slice(0,7)===m);
  const weeks=[];
  for(let i=3;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i*7);
    const wk=d.toISOString().slice(0,10);
    weeks.push({label:'Нед '+(4-i),count:thisM.filter(a=>a.date_created&&a.date_created.slice(0,10)<=wk).length});
  }
  return{total:thisM.length,posted:thisM.filter(a=>a.status==='posted').length,weeks};
}

  const over=apps.filter(a=>a.status==='work'&&a.perv_bo==='Да'&&(wds(a.date_gk)||0)>=6).length;
  const risk=apps.filter(a=>a.status==='work'&&a.perv_bo==='Да'&&(wds(a.date_gk)||0)>=4&&(wds(a.date_gk)||0)<6).length;
  if(over>0){sbCls='sb-err';sbIcon='!';sbMsg=`${over} нарушение срока постановки — административный риск`;}
  else if(risk>0){sbCls='sb-warn';sbIcon='⚠';sbMsg=`${risk} объект под риском нарушения срока`;}
  return`<div class="ph"><div><div class="pt">Дашборд руководителя</div><div class="ps">${new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div></div>
  <div class="status-bar ${sbCls}"><div class="sb-icon" style="background:${over>0?'#dc2626':risk>0?'#d97706':'#16a34a'};color:#fff">${sbIcon}</div>${sbMsg}</div>
  <div class="mg">
    <div class="mc mcb"><div class="ml">Всего заявок</div><div class="mv">${apps.length}</div></div>
    <div class="mc mcg"><div class="ml">Поставлено</div><div class="mv" style="color:#15803d">${apps.filter(a=>a.status==='posted').length}</div></div>
    <div class="mc mcs"><div class="ml">На контроле ФО</div><div class="mv" style="color:#0891b2">${apps.filter(a=>a.status==='control').length}</div></div>
    <div class="mc mcr"><div class="ml">Нарушений</div><div class="mv" style="color:#dc2626">${over}</div></div>
  </div>
  ${prob.length>0?`<div class="card cb" style="border-color:#fecaca;margin-bottom:14px">
    <div class="sec" style="margin-top:0;color:#dc2626">Заблокированные платежи</div>
    ${prob.map(a=>`<div class="db" style="margin-bottom:8px">
      <div style="font-size:14px;font-weight:700">${esc(a.num)} · ${esc(a.num_ds)}</div>
      <div style="font-size:12px;color:#6b7280;margin-top:2px">${esc(a.pred_k||'—')} · ${esc(a.created_by_name)}</div>
      ${a.status==='rejected'?`<div class="dr">Отклонено ФО: ${esc(a.rejection_reason||'—')}</div>`:''}
      ${a.status==='work'&&(wds(a.date_gk)||0)>=6?`<div class="dr" style="background:#fef9c3;border-color:#fde68a;color:#854d0e">Просрочено на ${(wds(a.date_gk)||0)-5} р.д. — риск административного штрафа</div>`:''}
    </div>`).join('')}
  </div>`:`<div class="al als" style="margin-bottom:14px">Нет заблокированных платежей</div>`}
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
    <div class="card cb">
      <div class="sec" style="margin-top:0">Топ-3 сотрудников · ${mn}</div>
      <div class="t3">
        ${t3.length===0?'<div style="color:#9ca3af;font-size:13px">Заявок пока нет</div>':t3.map((x,i)=>`<div class="t3c ${mc[i]}"><div class="t3r">${['#1 Лидер','#2 Место','#3 Место'][i]}</div><div class="t3n">${esc(x.u.name.split(' ')[0])}</div><div class="t3d">${esc(x.u.position)}</div><div class="t3v">${x.n}</div><div class="t3l">заявок</div></div>`).join('')}
      </div>
    </div>
    <div class="card cb">
      <div class="sec" style="margin-top:0">Исполнение за месяц</div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div><div style="font-size:11px;color:#9ca3af">Создано</div><div style="font-size:22px;font-weight:800">${stats.total}</div></div>
        <div style="text-align:right"><div style="font-size:11px;color:#9ca3af">В срок</div><div style="font-size:22px;font-weight:800;color:#15803d">${pct}%</div></div>
      </div>
      <div style="height:4px;background:#f1f5f9;border-radius:99px;overflow:hidden">
        <div style="width:${pct}%;height:100%;background:#16a34a;border-radius:99px"></div>
      </div>
    </div>
  </div>`;}

// ── MODAL ──
function rModal(){
  const{type,data}=MODAL;const app=data?getA().find(a=>a.id===data):null;let c='';
  if(type==='sendCtrl')c=`<div class="mt">Отправить в ФО</div><div class="al alb">Заявка ${esc(app?.num)} · ${esc(app?.num_ds)} будет переведена в статус "На контроле ФО".</div><div style="display:flex;gap:8px;margin-top:1rem"><button class="btn-b" onclick="dSC(${data})">Подтвердить</button><button class="btns" onclick="cm()">Отмена</button></div>`;
  if(type==='accept')c=`<div class="mt">Принять — Поставлено</div><div class="al als">Заявка ${esc(app?.num)} · ${esc(app?.num_ds)} будет поставлена на учёт.</div><div class="fg" style="margin-bottom:1rem"><label>Комментарий</label><textarea id="mc" placeholder="Принято без замечаний"></textarea></div><div style="display:flex;gap:8px"><button class="btn-g" onclick="dA(${data})">Принять</button><button class="btns" onclick="cm()">Отмена</button></div>`;
  if(type==='reject')c=`<div class="mt">Отклонить заявку</div><div class="al ald">Причина будет видна договорнику и руководителю.</div><div class="fg" style="margin-bottom:9px"><label>Шаблон причины</label><select id="mrt" onchange="document.getElementById('mr').value=this.value==='Другое'?'':this.value"><option value="">— Выберите —</option>${RT.map(t=>`<option>${esc(t)}</option>`).join('')}</select></div><div class="fg" style="margin-bottom:1rem"><label>Причина (обязательно)</label><textarea id="mr" rows="3" placeholder="Укажите причину..."></textarea></div><div style="display:flex;gap:8px"><button class="btn-r" onclick="dR(${data})">Отклонить</button><button class="btns" onclick="cm()">Отмена</button></div>`;
  if(type==='rollback')c=`<div class="mt">Откатить заявку</div><div class="al alw">Заявка вернётся в статус "В работе".</div><div class="fg" style="margin-bottom:1rem"><label>Причина отката (обязательно)</label><textarea id="mrb" rows="3" placeholder="Укажите причину..."></textarea></div><div style="display:flex;gap:8px"><button class="btn-w" onclick="dRb(${data})">Откатить</button><button class="btns" onclick="cm()">Отмена</button></div>`;
  if(type==='newUser'||type==='editUser'){
    const u=type==='editUser'?getU().find(x=>x.id===data):null;
    const uv=k=>u?esc(u[k]||''):'';
    c=`<div class="mt">${u?'Редактировать':'Новый пользователь'}</div>
    <div class="g2" style="margin-bottom:10px"><div class="fg"><label>ФИО</label><input id="un" value="${uv('name')}" placeholder="Иванов Иван Иванович"/></div><div class="fg"><label>Логин</label><input id="ul" value="${uv('login')}" placeholder="ivanov"/></div></div>
    <div class="g2" style="margin-bottom:10px"><div class="fg"><label>Пароль${u?' (пусто — не менять)':''}</label><input type="password" id="up" placeholder="${u?'Новый пароль':'Пароль'}"/></div><div class="fg"><label>Роль</label><select id="ur">${['admin','contract','economist','director'].map(r=>`<option value="${r}"${(u?.role||'contract')===r?' selected':''}>${RL[r]||r}</option>`).join('')}</select></div></div>
    <div class="g2" style="margin-bottom:1.25rem"><div class="fg"><label>Отдел</label><select id="ud">${DEPTS.map(d=>`<option${(u?.department||'')===d?' selected':''}>${esc(d)}</option>`).join('')}</select></div><div class="fg"><label>Должность</label><select id="upos">${POSTS.map(p=>`<option${(u?.position||'')===p?' selected':''}>${esc(p)}</option>`).join('')}</select></div></div>
    <div style="display:flex;gap:8px"><button class="btnp" onclick="dSU(${u?u.id:'null'})">${u?'Сохранить':'Добавить'}</button><button class="btns" onclick="cm()">Отмена</button>${u&&u.id!==CU.id?`<button class="btn-r" style="margin-left:auto" onclick="if(confirm('Удалить?')){dDU(${u.id})}">Удалить</button>`:''}</div>`;}
  return`<div class="mbg" onclick="if(event.target===this)cm()"><div class="modal">${c}</div></div>`;}

// ── ACTIONS ──
function doLogin(){const l=(document.getElementById('ll').value||'').trim();const p=(document.getElementById('lp')||{}).value||'';const u=getU().find(u=>u.login===l&&u.password===p);if(!u){const e=document.getElementById('lerr');e.style.display='block';e.textContent='Неверный логин или пароль';return;}CU=u;PAGE=u.role==='director'?'director':u.role==='economist'?'reg':'dash';render();}
function logout(){CU=null;PAGE='dash';MODAL=null;EXP_ID=null;SEARCH='';FILTER='all';CTRL_OPEN={r:false,y:false};render();}
function gp(p){if(p==='form-new'){}PAGE=p;EXP_ID=null;render();}
function sf(f){FILTER=f;render();}
function ssearch(v){SEARCH=v;window._searchFocus=true;render();}
function te(id){EXP_ID=EXP_ID===id?null:id;render();}
function sm(t,d){MODAL={type:t,data:d};render();}
function cm(){MODAL=null;render();}
function gv(id){return(document.getElementById(id)||{}).value||'';}
function toggleCtrl(t){CTRL_OPEN[t]=!CTRL_OPEN[t];render();}
function toggleHist(id,chId){const el=document.getElementById(id);const ch=document.getElementById(chId);if(!el)return;const h=el.style.display==='none';el.style.display=h?'':'none';if(ch)ch.classList.toggle('open',h);}

function toggleGK(){
  const pb=document.getElementById('f-pb');
  const gk=document.getElementById('f-gk');
  const row=document.getElementById('gk-row');
  const bg=document.getElementById('f-bg');
  if(!pb||!gk||!row)return;
  const isYes=pb.value==='Да';
  gk.disabled=!isYes;row.style.opacity=isYes?'1':'0.4';
  if(!isYes){gk.value='';document.getElementById('gkp').innerHTML='';}
  if(bg){bg.disabled=!isYes;if(!isYes){bg.value='Не требуется';updateDocField('f-bg','f-bg-extra','f-bg-max');}}
}

function ugkp(){
  const dg=gv('f-gk');const el=document.getElementById('gkp');if(!el)return;
  if(!dg){el.innerHTML='';return;}
  const d=dli({date_gk:dg,status:'work',perv_bo:'Да'});
  el.innerHTML=`<span style="font-size:12px;color:#6b7280">Срок: </span>${bdg(d.l,d.t)}`;
}

function svf(eid){
  const pb=gv('f-pb');const isGK=pb==='Да';
  const ob=gv('f-ob');const rp=gv('f-rp');
  const data={num_ds:gv('f-nd'),date_ds:gv('f-dd'),num_k:gv('f-nk'),eis:gv('f-eis'),easuz:gv('f-ea'),perv_bo:pb,date_gk:isGK?gv('f-gk'):'',pred_ds:gv('f-pd'),pred_k:gv('f-pk'),obrashenie:ob,obrashenie_num:ob==='Приложен'?gv('f-ob-num'):'',rasp:rp,rasp_num:rp==='Приложен'?gv('f-rp-num'):'',mvk:gv('f-mv'),bg:isGK?gv('f-bg'):'Не требуется'};
  const apps=getA();
  if(eid){const idx=apps.findIndex(a=>a.id===eid);if(idx>=0){const o=apps[idx];Object.assign(o,data);ah(o,'Заявка отредактирована');if(o.status==='rejected'){o.status='work';o.rejection_reason='';ah(o,'Возвращено в работу','После исправления');}}}
  else{const a={...data,id:Date.now(),num:nn(),created_by:CU.id,created_by_name:CU.name,date_created:ni(),status:'work',rejection_reason:'',history:[]};ah(a,'Заявка создана');apps.push(a);}
  save();PAGE='reg';EXP_ID=null;render();}

function dSC(id){const a=getA().find(x=>x.id===id);if(!a)return;a.status='control';ah(a,'Отправлено в ФО','Направлено в МЭФ через ГИС РЭБЕ');save();cm();}
function dA(id){const a=getA().find(x=>x.id===id);if(!a)return;a.status='posted';ah(a,'Поставлено на учёт',gv('mc')||'Принято МЭФ');save();cm();}
function dR(id){const r=gv('mr');if(!r.trim()){alert('Укажите причину');return;}const a=getA().find(x=>x.id===id);if(!a)return;a.status='rejected';a.rejection_reason=r;ah(a,'Отклонено ФО',r);save();cm();}
function dRb(id){const r=gv('mrb');if(!r.trim()){alert('Укажите причину');return;}const a=getA().find(x=>x.id===id);if(!a)return;const p=SL[a.status]||a.status;a.status='work';a.rejection_reason='';ah(a,`Откатано из "${p}"`,r);save();cm();}
function dSU(eid){const n=gv('un'),l=gv('ul'),p=gv('up'),r=gv('ur'),d=gv('ud'),pos=gv('upos');if(!n||!l){alert('Заполните ФИО и логин');return;}const us=getU();if(eid){const u=us.find(x=>x.id===eid);if(u){u.name=n;u.login=l;if(p)u.password=p;u.role=r;u.department=d;u.position=pos;}}else{if(!p){alert('Укажите пароль');return;}if(us.find(u=>u.login===l)){alert('Логин уже занят');return;}us.push({id:Date.now(),name:n,login:l,password:p,role:r,department:d,position:pos});}save();cm();}
function dDU(id){_u=getU().filter(u=>u.id!==id);save();cm();}
function delA(id){_a=getA().filter(a=>a.id!==id);save();PAGE='reg';render();}

function expCsv(){
  const apps=getA();const BOM='\uFEFF';
  const h=['Номер','Создал','Дата','Статус','Тип','Номер ДС','Дата ДС','Контракт','ЕИС','ЕАСУЗ','Первичное БО','Дата ГК','Предмет ДС','Предмет контракта','Обращение к министру','Номер обращения','Распоряжение Минстроя МО','Номер распоряжения','МВК','Банковская гарантия','Причина отклонения'];
  const rows=apps.map(a=>[a.num,a.created_by_name,new Date(a.date_created).toLocaleDateString('ru-RU'),SL[a.status]||a.status,a.perv_bo==='Да'?'Первичный ГК':'ДС',a.num_ds,a.date_ds,a.num_k,a.eis,a.easuz,a.perv_bo,a.date_gk,a.pred_ds,a.pred_k,a.obrashenie,a.obrashenie_num,a.rasp,a.rasp_num,a.mvk,a.bg,a.rejection_reason].map(v=>'"'+(v||'').replace(/"/g,'""')+'"'));
  const csv=BOM+[h.join(';'),...rows.map(r=>r.join(';'))].join('\n');
  const el=document.createElement('a');el.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);el.download='реестр_БО_'+new Date().toISOString().split('T')[0]+'.csv';el.click();}

getU();getA();render();
</script>
