<body>
<div id="app"></div>
<script>

const STATUS_LABELS = {work:'В работе',control:'На контроле ФО',posted:'Поставлено',rejected:'Отклонено'};
const STATUS_T = {work:'n',control:'bb',posted:'s',rejected:'d'};

// ===== STATE =====
let CU = null; // current user
let PAGE = 'dash';
let MODAL = null;
let EDIT_ID = null;
let EXP_ID = null;
let FILTER = 'all';
let SEARCH = '';
let FORM_FILES = []; // temp file storage during form edit

// ===== DB =====
let _users = null, _apps = null;

function getUsers() {
  if (_users) return _users;
  try { _users = JSON.parse(localStorage.getItem('bo_v1_users') || 'null'); } catch {}
  if (!_users) _users = [
    {id:1, name:'Смирнова А.В.', login:'admin', password:'admin', role:'admin', department:'Бухгалтерия', position:'Начальник отдела учёта'},
    {id:2, name:'Иванов И.И.', login:'ivanov', password:'1234', role:'contract', department:'Договорной отдел', position:'Договорник'},
    {id:3, name:'Петрова А.С.', login:'petrova', password:'1234', role:'contract', department:'Договорной отдел', position:'Ведущий специалист'},
    {id:4, name:'Козлов Д.Р.', login:'kozlov', password:'1234', role:'economist', department:'Планово-экономический отдел', position:'Экономист'},
    {id:5, name:'Генеральный директор', login:'director', password:'director', role:'director', department:'Руководство', position:'Генеральный директор'},
  ];

}

function getApps() {

  try { _apps = JSON.parse(localStorage.getItem('bo_v1_apps') || 'null'); } catch {}
  if (!_apps) {

    const d4 = new Date(today); d4.setDate(today.getDate()-4);

       perv_bo:'Да', date_gk:d7.toISOString().split('T')[0], pred_ds:'Изменение сроков и условий исполнения',
       pred_k:'Выполнение строительно-монтажных работ', summa:'4 750 000', kbk:'902 0702 15E0113970 244',
       kosgu:'225', kontragent:'ООО "СтройМонтаж"', sogl:'Приложен', mvk:'Приложен', rasp:'Приложен',
       files:[], status:'posted', history:[
         {dt:d7.toISOString(), user:'Иванов И.И.', action:'Заявка создана', comment:''},
         {dt:d4.toISOString(), user:'Смирнова А.В.', action:'Отправлено в ФО', comment:''},
         {dt:d1.toISOString(), user:'Смирнова А.В.', action:'Поставлено на учёт', comment:'Принято МЭФ без замечаний'},
       ], rejection_reason:''},
      {id:1002, num:'2/'+YEAR, created_by:3, created_by_name:'Петрова А.С.', date_created:d4.toISOString(),

function saveAll() {
  localStorage.setItem('bo_v1_users', JSON.stringify(getUsers()));
  localStorage.setItem('bo_v1_apps', JSON.stringify(getApps()));
}

// ===== WORKING DAYS =====
function isNonWorking(date) {
  const d = new Date(date); d.setHours(12);
  const day = d.getDay();
  if (day === 0 || day === 6) return true;
  return RU_HOLIDAYS.has(d.toISOString().split('T')[0]);
}

function workingDaysSince(dateStr) {
  if (!dateStr) return null;
  const start = new Date(dateStr); start.setHours(0,0,0,0);
  const today = new Date(); today.setHours(0,0,0,0);
  if (today <= start) return 0;
  let count = 0;
  const cur = new Date(start); cur.setDate(cur.getDate()+1);
  while (cur <= today) { if (!isNonWorking(cur)) count++; cur.setDate(cur.getDate()+1); }
  return count;
}

function deadlineInfo(app) {
  if (app.status === 'posted') return {label:'Поставлено', t:'s'};
  if (app.status === 'rejected') return {label:'Отклонено ФО', t:'d'};
  if (app.status === 'control') return {label:'На контроле ФО', t:'b'};
  const d = workingDaysSince(app.date_gk);
  if (d === null) return {label:'Нет даты ГК', t:'n'};
  if (d >= 6) return {label:'Просрочено +' + (d-5) + ' р.д.', t:'d'};
  if (d >= 4) return {label:'Риск (' + (6-d) + ' р.д.)', t:'w'};
  return {label:'В срок (' + (6-d) + ' р.д.)', t:'s'};
}

function dotColor(t) {
  return {s:'#3b6d11',w:'#854f0b',d:'#a32d2d',n:'#888780',b:'#185fa5'}[t]||'#888780';
}

// ===== UTILS =====
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function badge(l,t) { const cls={s:'bs',w:'bw',d:'bd',n:'bn',b:'bb'}[t]||'bn'; return `<span class="badge ${cls}">${esc(l)}</span>`; }
function dot(t) { return `<span class="dot" style="background:${dotColor(t)}"></span>`; }
function fmt(v) { return v||'—'; }
function fmtDT(iso) { if(!iso) return '—'; const d=new Date(iso); return d.toLocaleDateString('ru-RU')+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
function nowISO() { return new Date().toISOString(); }
function thisMonth() { const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }

function nextNum() {
  const apps = getApps();
  if (!apps.length) return '1/'+YEAR;
  return (Math.max(...apps.map(a=>parseInt(a.num)||0))+1)+'/'+YEAR;
}

function addHistory(app, action, comment='') {
  if (!app.history) app.history=[];
  app.history.push({dt:nowISO(), user:CU.name, action, comment});
}

function top3() {
  const month = thisMonth();
  const contracts = getUsers().filter(u=>u.role==='contract');
  const apps = getApps();
  const counts = {};
  contracts.forEach(u => {
    const cnt = apps.filter(a => {
      if (a.created_by !== u.id) return false;
      const m = a.date_created ? a.date_created.slice(0,7) : '';
      return m === month;
    }).length;
    if (cnt > 0) counts[u.id] = {user: u, cnt};
  });
  return Object.values(counts).sort((a,b)=>b.cnt-a.cnt).slice(0,3);
}

// ===== RENDER ENGINE =====
function render() {
  if (!CU) { document.getElementById('app').innerHTML = renderLogin(); attachLoginListeners(); return; }
  document.getElementById('app').innerHTML = `
    <div class="app-wrap">
      ${renderSidebar()}
      <div class="main">${renderPage()}</div>
    </div>
    ${MODAL ? renderModal() : ''}
  `;
  attachListeners();
}

function renderLogin() {
  return `<div class="login-wrap"><div class="login-card">
    <div class="login-org">ГКУ МО ДЗКС · Бухгалтерия</div>
    <div class="login-title">Реестр постановки БО</div>
    <div class="login-sub">Учёт и контроль бюджетных обязательств</div>
    <div id="login-err" class="alert alert-d" style="display:none"></div>
    <div class="fg" style="margin-bottom:14px"><label>Логин</label><input id="li-login" placeholder="Введите логин"/></div>
    <div class="fg" style="margin-bottom:1.5rem"><label>Пароль</label><input type="password" id="li-pass" placeholder="Введите пароль"/></div>
    <button class="btnp" style="width:100%" onclick="doLogin()">Войти</button>
    <div style="margin-top:1.25rem;font-size:12px;color:#888780;text-align:center">Для доступа обратитесь к администратору</div>
  </div></div>`;
}

function attachLoginListeners() {
  document.getElementById('li-pass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
}

function renderSidebar() {
  const navItems = buildNav();

function buildNav() {
  const role = CU.role;
  if (role === 'director') return [{page:'director',label:'Дашборд руководителя'}];
  if (role === 'economist') return [{page:'reg',label:'Реестр заявок'}];
  const items = [];
  items.push({page:'dash', label:'Дашборд'});
  items.push({page:'reg', label:'Реестр заявок'});
  if (role === 'admin' || role === 'contract') items.push({page:'form-new', label:'+ Новая заявка'});
  if (role === 'admin') { items.push('---'); items.push({page:'users', label:'Пользователи'}); }
  // Rejected for contract user
  if (role === 'contract') {
    const myRejected = getApps().filter(a=>a.created_by===CU.id && a.status==='rejected').length;
    if (myRejected > 0) items.push({page:'my-rejected', label:`Отклонено (${myRejected})`, warn:true});
  }
  return items;
}

function renderPage() {
  if (PAGE === 'director') return renderDirector();
  if (PAGE === 'users') return CU.role==='admin' ? renderUsers() : '<p>Нет доступа</p>';
  if (PAGE === 'form-new') return renderForm(null);
  if (PAGE && PAGE.startsWith('form-edit-')) return renderForm(parseInt(PAGE.split('-')[2]));
  if (PAGE === 'my-rejected') return renderMyRejected();
  if (PAGE === 'dash') return renderDash();
  if (PAGE === 'reg') return renderReg();
  return renderDash();
}

        <div class="fg"><label>МВК</label><select id="f-mvk"><option${(app?app.mvk:'')==='Не требуется'?' selected':''}>Не требуется</option><option${(app?app.mvk:'')==='Приложен'?' selected':''}>Приложен</option></select></div>
        <div class="fg"><label>Распоряжение</label><select id="f-rasp"><option${(app?app.rasp:'')==='Не требуется'?' selected':''}>Не требуется</option><option${(app?app.rasp:'')==='Приложен'?' selected':''}>Приложен</option></select></div>
      </div>

      <div class="sec">Дополнительные файлы (PDF, DOC, DOCX)</div>
      <div style="margin-bottom:10px">
        <input type="file" id="file-input" accept=".pdf,.doc,.docx,.xlsx" multiple style="display:none" onchange="handleFiles(this.files)"/>
        <button class="btns" style="font-size:13px" onclick="document.getElementById('file-input').click()">Загрузить файлы</button>
        <span style="font-size:12px;color:#888780;margin-left:8px">Макс. 1MB на файл</span>
      </div>
      <div class="flist" id="file-list">${filesHTML}</div>

      <div class="div"></div>
      <div style="display:flex;gap:8px;margin-top:.5rem">
        <button class="btnp" onclick="saveForm(${editId||'null'})">${isEdit?'Сохранить изменения':'Создать заявку'}</button>
        <button class="btns" onclick="goPage('reg')">Отмена</button>
        ${isEdit&&CU.role==='admin'?`<button class="btn-r" style="margin-left:auto" onclick="if(confirm('Удалить заявку?')){deleteApp(${editId})}">Удалить заявку</button>`:''}
      </div>
    </div>`;
}

// ===== USERS =====
function renderUsers() {
  const users = getUsers();
  const editingId = window._editingUserId || null;

  return `
    <div class="ph"><div><div class="pt">Пользователи системы</div><div class="ps">Управление доступом</div></div>
    <button class="btnp" onclick="showModal('newUser',null)">+ Добавить пользователя</button></div>
    <div class="card" style="overflow:hidden;padding:0">
      <table>
        <thead><tr><th>ФИО</th><th>Логин</th><th>Роль</th><th>Отдел</th><th>Должность</th><th></th></tr></thead>

          ${users.map(u=>`<tr>
            <td style="font-weight:500">${esc(u.name)}</td>
            <td style="font-size:13px;color:#5f5e5a">${esc(u.login)}</td>
            <td>${badge(ROLE_LABELS[u.role]||u.role, u.role==='admin'?'d':u.role==='director'?'w':u.role==='contract'?'b':'n')}</td>

// ===== DIRECTOR =====
function renderDirector() {
  const apps = getApps();
  const posted = apps.filter(a=>a.status==='posted').length;
  const control = apps.filter(a=>a.status==='control').length;
  const rejected = apps.filter(a=>a.status==='rejected').length;
  const overdue = apps.filter(a=>a.status==='work' && workingDaysSince(a.date_gk)>=6).length;
  const t3 = top3();
  const medalClasses = ['t3-1','t3-2','t3-3'];
  const problems = apps.filter(a=>a.status==='rejected'||a.status==='work'&&workingDaysSince(a.date_gk)>=4);
  const monthName = new Date().toLocaleDateString('ru-RU',{month:'long',year:'numeric'});

  return `
    <div class="ph"><div><div class="pt">Дашборд руководителя</div><div class="ps">${new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div></div>
    <div class="mg">
      <div class="mc"><div class="ml">Всего заявок</div><div class="mv">${apps.length}</div></div>
      <div class="mc"><div class="ml">Поставлено</div><div class="mv" style="color:#3b6d11">${posted}</div></div>
      <div class="mc"><div class="ml">На контроле ФО</div><div class="mv" style="color:#185fa5">${control}</div></div>
      <div class="mc"><div class="ml">Проблемных</div><div class="mv" style="color:#a32d2d">${rejected+overdue}</div></div>
    </div>
    ${problems.length>0?`
    <div class="card card-body" style="margin-bottom:14px;border-color:#f7c1c1">
      <div class="sec" style="margin-top:0;color:#a32d2d">Заблокированные платежи — требуется внимание</div>
      ${problems.map(a=>{
        const c = deadlineInfo(a);
        return `<div class="dir-block">
          <div style="display:flex;justify-content:space-between;align-items:flex-start">
            <div><div class="dir-block-title">${esc(a.num)} · ${esc(a.num_ds||'—')} · ${esc(a.pred_k||a.num_k||'—')}</div>
            <div style="font-size:13px;color:#5f5e5a">Создал: ${esc(a.created_by_name)} · Контрагент: ${esc(a.kontragent||'—')}</div></div>
            ${a.summa?`<div class="dir-block-amount">${esc(a.summa)} руб.</div>`:''}
          </div>
          ${a.status==='rejected'?`<div class="dir-block-reason">Причина отклонения ФО: ${esc(a.rejection_reason||'Не указана')}</div>`:''}
          ${a.status==='work'&&workingDaysSince(a.date_gk)>=6?`<div class="dir-block-reason" style="background:#faeeda;border:1px solid #fac775;color:#633806">Просрочено на ${workingDaysSince(a.date_gk)-5} рабочих дней — штрафные риски</div>`:''}
        </div>`;
      }).join('')}
    </div>`:'<div class="alert alert-s" style="margin-bottom:14px">Нет заблокированных платежей</div>'}
    <div class="card card-body">
      <div class="sec" style="margin-top:0">Топ-3 договорника · ${monthName}</div>
      <div class="t3wrap">
        ${t3.length===0?'<div style="color:#888780;font-size:14px">Заявок в этом месяце пока нет</div>':
          t3.map((item,i)=>`<div class="t3card ${medalClasses[i]}">
            <div class="t3rank">${i===0?'#1 Лидер':i===1?'#2':'#3'}</div>
            <div class="t3name">${esc(item.user.name)}</div>
            <div class="t3dept">${esc(item.user.position)}</div>
            <div class="t3cnt">${item.cnt}</div>
            <div class="t3lbl">заявок в этом месяце</div>
          </div>`).join('')}
      </div>
    </div>`;
}

// ===== MODAL =====
function renderModal() {
  if (!MODAL) return '';
  let content = '';
  const {type, data} = MODAL;
  const app = data ? getApps().find(a=>a.id===data) : null;

  if (type === 'sendControl') content = `
    <div class="modal-title">Отправить в ФО на контроль</div>
    <div class="alert alert-b">Заявка ${esc(app?.num)} будет переведена в статус "На контроле ФО".<br>Вы отправили данные в ГИС РЭБЕ на проверку МЭФ.</div>
    <div style="display:flex;gap:8px;margin-top:1rem">
      <button class="btn-b" onclick="doSendControl(${data})">Подтвердить</button>
      <button class="btns" onclick="closeModal()">Отмена</button>
    </div>`;

  if (type === 'accept') content = `
    <div class="modal-title">Принять — Поставлено на учёт</div>
    <div class="alert alert-s">Заявка ${esc(app?.num)} принята ФО. Статус изменится на "Поставлено".</div>
    <div class="fg" style="margin-bottom:1rem"><label>Комментарий (необязательно)</label><textarea id="m-comment" placeholder="Принято без замечаний"></textarea></div>
    <div style="display:flex;gap:8px">
      <button class="btn-g" onclick="doAccept(${data})">Принять</button>
      <button class="btns" onclick="closeModal()">Отмена</button>
    </div>`;

  if (type === 'reject') content = `
    <div class="modal-title">Отклонить заявку</div>
    <div class="alert alert-d">МЭФ отклонил заявку ${esc(app?.num)}. Укажите причину — она будет видна договорнику и генеральному директору.</div>
    <div class="fg" style="margin-bottom:10px"><label>Шаблон причины</label>
      <select id="m-template" onchange="document.getElementById('m-reason').value=this.value==='Другое'?'':this.value">
        <option value="">— Выберите причину —</option>
        ${REJECT_TEMPLATES.map(t=>`<option>${esc(t)}</option>`).join('')}
      </select>
    </div>
    <div class="fg" style="margin-bottom:1rem"><label>Причина отклонения (обязательно)</label><textarea id="m-reason" placeholder="Укажите причину отклонения..." rows="3"></textarea></div>
    <div style="display:flex;gap:8px">
      <button class="btn-r" onclick="doReject(${data})">Отклонить</button>
      <button class="btns" onclick="closeModal()">Отмена</button>
    </div>`;

  if (type === 'rollback') content = `
    <div class="modal-title">Откатить заявку</div>
    <div class="alert alert-w">Заявка будет возвращена в статус "В работе". Договорник сможет внести исправления.</div>
    <div class="fg" style="margin-bottom:1rem"><label>Причина отката (обязательно)</label><textarea id="m-rollback-reason" placeholder="Например: ошибка в реквизитах, неверный КБК..." rows="3"></textarea></div>
    <div style="display:flex;gap:8px">
      <button class="btn-w" onclick="doRollback(${data})">Откатить</button>
      <button class="btns" onclick="closeModal()">Отмена</button>
    </div>`;

  if (type === 'newUser' || type === 'editUser') {
    const u = type==='editUser' ? getUsers().find(x=>x.id===data) : null;
    const uv = k => u ? esc(u[k]||'') : '';
    content = `
      <div class="modal-title">${u ? 'Редактировать пользователя' : 'Новый пользователь'}</div>
      <div class="g2" style="margin-bottom:10px">
        <div class="fg"><label>ФИО</label><input id="u-name" value="${uv('name')}" placeholder="Иванов Иван Иванович"/></div>
        <div class="fg"><label>Логин</label><input id="u-login" value="${uv('login')}" placeholder="ivanov"/></div>
      </div>
      <div class="g2" style="margin-bottom:10px">
        <div class="fg"><label>Пароль${u?' (оставьте пустым чтобы не менять)':''}</label><input type="password" id="u-pass" placeholder="${u?'Новый пароль':'Пароль'}"/></div>
        <div class="fg"><label>Роль</label><select id="u-role">
          ${['admin','contract','economist','director'].map(r=>`<option value="${r}"${(u?.role||'contract')===r?' selected':''}>${ROLE_LABELS[r]}</option>`).join('')}
        </select></div>
      </div>
      <div class="g2" style="margin-bottom:1rem">
        <div class="fg"><label>Отдел</label><input id="u-dept" value="${uv('department')}" placeholder="Договорной отдел"/></div>
        <div class="fg"><label>Должность</label><input id="u-pos" value="${uv('position')}" placeholder="Ведущий специалист"/></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btnp" onclick="doSaveUser(${u?u.id:'null'})">${u?'Сохранить':'Добавить'}</button>
        <button class="btns" onclick="closeModal()">Отмена</button>
        ${u&&u.id!==CU.id?`<button class="btn-r" style="margin-left:auto" onclick="if(confirm('Удалить пользователя?')){doDeleteUser(${u.id})}">Удалить</button>`:''}
      </div>`;
  }

  return `<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${content}</div></div>`;
}

// ===== ACTIONS =====
function doLogin() {
  const login = document.getElementById('li-login').value.trim();
  const pass = document.getElementById('li-pass').value;
  const user = getUsers().find(u=>u.login===login && u.password===pass);
  if (!user) {
    const err = document.getElementById('login-err');
    err.style.display='block'; err.textContent='Неверный логин или пароль';
    return;
  }
  CU = user;
  FORM_FILES = [];
  PAGE = user.role === 'director' ? 'director' : user.role === 'economist' ? 'reg' : 'dash';
  render();
}

function doLogout() { CU = null; PAGE = 'dash'; MODAL = null; EXP_ID = null; SEARCH = ''; FILTER = 'all'; FORM_FILES = []; render(); }

function goPage(page) {
  if (page === 'form-new') FORM_FILES = [];
  PAGE = page; EXP_ID = null; render();
}

function setFilter(f) { FILTER = f; render(); }
function setSearch(v) { SEARCH = v; render(); }
function toggleExp(id) { EXP_ID = EXP_ID === id ? null : id; render(); }
function showModal(type, data) { MODAL = {type, data}; render(); }
function closeModal() { MODAL = null; render(); }

function updateGKPreview() {
  const dg = document.getElementById('f-dategk').value;
  const el = document.getElementById('gk-preview');
  if (!el) return;
  if (!dg) { el.innerHTML=''; return; }
  const mock = {date_gk:dg,status:'work'};
  const di = deadlineInfo(mock);
  el.innerHTML = `<span style="font-size:13px;color:#5f5e5a">Срок: </span>${badge(di.label,di.t)}`;
}

function handleFiles(fileList) {
  Array.from(fileList).forEach(file => {
    if (file.size > 1024*1024) { alert(`Файл "${file.name}" слишком большой (>${Math.round(file.size/1024)}KB). Максимум 1MB.`); return; }
    const reader = new FileReader();
    reader.onload = e => {
      FORM_FILES.push({name:file.name, type:file.type, size:file.size, data:e.target.result});
      const fl = document.getElementById('file-list');
      if (fl) fl.innerHTML = FORM_FILES.map((f,i)=>`<div class="fchip">${esc(f.name)}<span style="color:#888780;font-size:11px">(${Math.round(f.size/1024)}KB)</span><span class="frm" onclick="removeFile(${i})">×</span></div>`).join('');
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('file-input').value='';
}

function removeFile(i) {
  FORM_FILES.splice(i,1);
  const fl = document.getElementById('file-list');
  if (fl) fl.innerHTML = FORM_FILES.map((f,idx)=>`<div class="fchip">${esc(f.name)}<span style="color:#888780;font-size:11px">(${Math.round(f.size/1024)}KB)</span><span class="frm" onclick="removeFile(${idx})">×</span></div>`).join('');
}

function saveForm(editId) {
  const g = id => (document.getElementById(id)||{}).value||'';
  const data = {
    num_ds:g('f-numds'), date_ds:g('f-dateds'), num_k:g('f-numk'), easuz:g('f-easuz'),
    perv_bo:g('f-pervbo'), date_gk:g('f-dategk'), pred_ds:g('f-predds'), pred_k:g('f-predk'),
    summa:g('f-summa'), kbk:g('f-kbk'), kosgu:g('f-kosgu'), kontragent:g('f-kontragent'),
    sogl:g('f-sogl'), mvk:g('f-mvk'), rasp:g('f-rasp'), files:[...FORM_FILES],
  };
  const apps = getApps();
  if (editId) {
    const idx = apps.findIndex(a=>a.id===editId);
    if (idx>=0) {
      const old = apps[idx];
      Object.assign(old, data);
      addHistory(old,'Заявка отредактирована','');
      if (old.status==='rejected') { old.status='work'; old.rejection_reason=''; addHistory(old,'Возвращено в работу','После исправления'); }
    }
  } else {
    const app = {...data, id:Date.now(), num:nextNum(), created_by:CU.id, created_by_name:CU.name,
      date_created:nowISO(), status:'work', rejection_reason:'', history:[]};
    addHistory(app,'Заявка создана','');
    apps.push(app);
  }
  saveAll();
  FORM_FILES=[];
  PAGE='reg'; EXP_ID=null; render();
}

function doSendControl(id) {
  const app = getApps().find(a=>a.id===id);
  if (!app) return;
  app.status='control';
  addHistory(app,'Отправлено в ФО','Документы направлены в МЭФ через ГИС РЭБЕ');
  saveAll(); closeModal();
}

function doAccept(id) {
  const app = getApps().find(a=>a.id===id);
  if (!app) return;
  const comment = (document.getElementById('m-comment')||{}).value||'';
  app.status='posted';
  addHistory(app,'Поставлено на учёт',comment||'Принято МЭФ');
  saveAll(); closeModal();
}

function doReject(id) {
  const reason = (document.getElementById('m-reason')||{}).value||'';
  if (!reason.trim()) { alert('Укажите причину отклонения'); return; }
  const app = getApps().find(a=>a.id===id);
  if (!app) return;
  app.status='rejected';
  app.rejection_reason=reason;
  addHistory(app,'Отклонено ФО',reason);
  saveAll(); closeModal();
}

function doRollback(id) {
  const reason = (document.getElementById('m-rollback-reason')||{}).value||'';
  if (!reason.trim()) { alert('Укажите причину отката'); return; }
  const app = getApps().find(a=>a.id===id);
  if (!app) return;
  const prevStatus = STATUS_LABELS[app.status]||app.status;
  app.status='work';
  app.rejection_reason='';
  addHistory(app,`Откатано из "${prevStatus}"`,reason);
  saveAll(); closeModal();
}

function doSaveUser(editId) {
  const g = id => (document.getElementById(id)||{}).value||'';
  const name=g('u-name'),login=g('u-login'),pass=g('u-pass'),role=g('u-role'),dept=g('u-dept'),pos=g('u-pos');
  if (!name||!login) { alert('Заполните ФИО и логин'); return; }
  const users = getUsers();
  if (editId) {
    const u = users.find(x=>x.id===editId);
    if (u) { u.name=name;u.login=login;if(pass)u.password=pass;u.role=role;u.department=dept;u.position=pos; }
  } else {
    if (!pass) { alert('Укажите пароль'); return; }
    if (users.find(u=>u.login===login)) { alert('Логин уже занят'); return; }
    users.push({id:Date.now(),name,login,password:pass,role,department:dept,position:pos});
  }
  saveAll(); closeModal();
}

function doDeleteUser(id) {
  _users = getUsers().filter(u=>u.id!==id);
  saveAll(); closeModal();
}

function deleteApp(id) {
  _apps = getApps().filter(a=>a.id!==id);
  saveAll(); FORM_FILES=[]; PAGE='reg'; render();
}

function exportExcel() {
  const apps = getApps();
  const BOM = '\uFEFF';
  const headers = ['Номер','Создал','Дата создания','Статус','Номер ДС','Дата ДС','Контракт','ЕАСУЗ','Первичное БО','Дата ГК','Контрагент','Сумма','КБК','КОСГУ','Предмет ДС','Предмет контракта','Согл','МВК','Распоряжение','Причина отклонения'];
  const rows = apps.map(a=>[
    a.num,a.created_by_name,new Date(a.date_created).toLocaleDateString('ru-RU'),
    STATUS_LABELS[a.status]||a.status,a.num_ds,a.date_ds,a.num_k,a.easuz,a.perv_bo,a.date_gk,
    a.kontragent,a.summa,a.kbk,a.kosgu,a.pred_ds,a.pred_k,a.sogl,a.mvk,a.rasp,a.rejection_reason
  ].map(v=>'"'+(v||'').replace(/"/g,'""')+'"'));
  const csv = BOM+[headers.join(';'),...rows.map(r=>r.join(';'))].join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = 'реестр_БО_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

// ===== ATTACH LISTENERS =====
function attachListeners() {
  // Keyboard support for search
  const si = document.getElementById('search-input');
  if (si) si.addEventListener('keydown', e=>{ if(e.key==='Escape') setSearch(''); });
}

// ===== INIT =====
getUsers(); getApps();
render();
</script>
