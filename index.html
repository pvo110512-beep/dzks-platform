function bNav(){
  const r=CU.role;
  if(r==='director')return[{p:'director',l:'Дашборд',ic:'dir'},{p:'ctrl',l:'Контроль сроков',ic:'ctrl'}];
  if(r==='economist')return[{p:'reg',l:'Реестр заявок',ic:'reg'},{p:'ctrl',l:'Контроль сроков',ic:'ctrl'}];
  const it=[{p:'dash',l:'Дашборд',ic:'dash'},{p:'ctrl',l:'Контроль сроков',ic:'ctrl'},{p:'reg',l:'Реестр заявок',ic:'reg'}];
  if(r==='admin'||r==='contract')it.push({p:'form-new',l:'Новая заявка',ic:'plus'});
  if(r==='admin'){it.push('---');it.push({p:'users',l:'Пользователи',ic:'users'});}

function rPage(){
  if(PAGE==='director')return rDir();

    <div class="g2" style="margin-bottom:1.25rem"><div class="fg"><label>Отдел</label><select id="ud">${DEPTS.map(d=>`<option${(u?.department||'')===d?' selected':''}>${esc(d)}</option>`).join('')}</select></div><div class="fg"><label>Должность</label><select id="upos">${POSTS.map(p=>`<option${(u?.position||'')===p?' selected':''}>${esc(p)}</option>`).join('')}</select></div></div>
    <div style="display:flex;gap:8px"><button class="btnp" onclick="dSU(${u?u.id:'null'})">${u?'Сохранить':'Добавить'}</button><button class="btns" onclick="cm()">Отмена</button>${u&&u.id!==CU.id?`<button class="btn-r" style="margin-left:auto" onclick="if(confirm('Удалить?')){dDU(${u.id})}">Удалить</button>`:''}</div>`;}
  return`<div class="mbg" onclick="if(event.target===this)cm()"><div class="modal">${c}</div></div>`;}

function doLogin(){
  const l=(document.getElementById('ll').value||'').trim();
  const p=(document.getElementById('lp')||{}).value||'';
  const u=getU().find(u=>u.login===l&&u.password===p);
  if(!u){const e=document.getElementById('lerr');e.style.display='block';return;}
  CU=u;saveSession();PAGE=u.role==='director'?'director':u.role==='economist'?'reg':'dash';render();
}
function logout(){CU=null;saveSession();PAGE='dash';MODAL=null;EXP_ID=null;SEARCH='';FILTER='all';CTRL_OPEN={r:false,y:false};render();}
function gp(p){PAGE=p;EXP_ID=null;render();}
function sf(f){FILTER=f;render();}
function ssearch(v){SEARCH=v;window._sf=true;render();}
function te(id){EXP_ID=EXP_ID===id?null:id;render();}
function sm(t,d){MODAL={type:t,data:d};render();}
function cm(){MODAL=null;render();}
function gv(id){return(document.getElementById(id)||{}).value||'';}
function toggleHist(id,chId){const el=document.getElementById(id);const ch=document.getElementById(chId);if(!el)return;const h=el.style.display==='none';el.style.display=h?'':'none';if(ch)ch.classList.toggle('open',h);}
function toggleGK(){
  const pb=document.getElementById('f-pb'),gk=document.getElementById('f-gk'),row=document.getElementById('gk-row'),bg=document.getElementById('f-bg');
  if(!pb||!gk||!row)return;
  const isYes=pb.value==='Да';
  gk.disabled=!isYes;row.style.opacity=isYes?'1':'0.35';
  if(!isYes){gk.value='';const gkp=document.getElementById('gkp');if(gkp)gkp.innerHTML='';}
  if(bg){bg.disabled=!isYes;if(!isYes){bg.value='Не требуется';const x=document.getElementById('f-bg-x');if(x)x.style.display='none';}}
}
function ugkp(){const dg=gv('f-gk');const el=document.getElementById('gkp');if(!el)return;if(!dg){el.innerHTML='';return;}const d=dli({date_gk:dg,status:'work',perv_bo:'Да'});el.innerHTML=`<span style="font-size:13px;color:#64748b">Срок: </span>${bdg(d.l,d.t)}`;}
function svf(eid){
  const pb=gv('f-pb');const isGK=pb==='Да';const ob=gv('f-ob');const rp=gv('f-rp');
  const data={num_ds:gv('f-nd'),date_ds:gv('f-dd'),num_k:gv('f-nk'),eis:gv('f-eis'),easuz:gv('f-ea'),perv_bo:pb,date_gk:isGK?gv('f-gk'):'',pred_ds:gv('f-pd'),pred_k:gv('f-pk'),obrashenie:ob,obrashenie_num:ob==='Приложен'?gv('f-ob-n'):'',rasp:rp,rasp_num:rp==='Приложен'?gv('f-rp-n'):'',mvk:gv('f-mv'),bg:isGK?gv('f-bg'):'Не требуется'};
  const apps=getA();
  if(eid){const idx=apps.findIndex(a=>a.id===eid);if(idx>=0){const o=apps[idx];Object.assign(o,data);ah(o,'Заявка отредактирована');if(o.status==='rejected'){o.status='work';o.rejection_reason='';ah(o,'Возвращено в работу','После исправления');}}}
  else{const a={...data,id:Date.now(),num:nn(),created_by:CU.id,created_by_name:CU.name,date_created:ni(),status:'work',rejection_reason:'',history:[]};ah(a,'Заявка создана');apps.push(a);}
  saveAll();PAGE='reg';EXP_ID=null;render();
}
function dSC(id){const a=getA().find(x=>x.id===id);if(!a)return;a.status='control';ah(a,'Отправлено в ФО','Направлено в МЭФ через ГИС РЭБЕ');saveAll();cm();}
function dA(id){const a=getA().find(x=>x.id===id);if(!a)return;a.status='posted';ah(a,'Поставлено на учёт',gv('mc')||'Принято МЭФ');saveAll();cm();}
function dR(id){const r=gv('mr');if(!r.trim()){alert('Укажите причину');return;}const a=getA().find(x=>x.id===id);if(!a)return;a.status='rejected';a.rejection_reason=r;ah(a,'Отклонено ФО',r);saveAll();cm();}
function dRb(id){const r=gv('mrb');if(!r.trim()){alert('Укажите причину');return;}const a=getA().find(x=>x.id===id);if(!a)return;const p=SL[a.status]||a.status;a.status='work';a.rejection_reason='';ah(a,`Откатано из "${p}"`,r);saveAll();cm();}
function dSU(eid){const n=gv('un'),l=gv('ul'),p=gv('up'),r=gv('ur'),d=gv('ud'),pos=gv('upos');if(!n||!l){alert('Заполните ФИО и логин');return;}const us=getU();if(eid){const u=us.find(x=>x.id===eid);if(u){u.name=n;u.login=l;if(p)u.password=p;u.role=r;u.department=d;u.position=pos;}}else{if(!p){alert('Укажите пароль');return;}if(us.find(u=>u.login===l)){alert('Логин уже занят');return;}us.push({id:Date.now(),name:n,login:l,password:p,role:r,department:d,position:pos});}saveAll();cm();}
function dDU(id){_u=getU().filter(u=>u.id!==id);saveAll();cm();}
function delA(id){_a=getA().filter(a=>a.id!==id);saveAll();PAGE='reg';render();}
function expCsv(){
  const apps=getA();const BOM='\uFEFF';
  const h=['Номер','Создал','Дата','Статус','Тип','Номер ДС','Дата ДС','Контракт','ЕИС','ЕАСУЗ','Первичное БО','Дата ГК','Предмет ДС','Предмет контракта','Обращение к министру','Номер обращения','Распоряжение Минстроя МО','Номер распоряжения','МВК','Банковская гарантия','Причина отклонения'];
  const rows=apps.map(a=>[a.num,a.created_by_name,new Date(a.date_created).toLocaleDateString('ru-RU'),SL[a.status]||a.status,a.perv_bo==='Да'?'Первичный ГК':'ДС',a.num_ds,a.date_ds,a.num_k,a.eis,a.easuz,a.perv_bo,a.date_gk,a.pred_ds,a.pred_k,a.obrashenie,a.obrashenie_num,a.rasp,a.rasp_num,a.mvk,a.bg,a.rejection_reason].map(v=>'"'+(v||'').replace(/"/g,'""')+'"'));
  const csv=BOM+[h.join(';'),...rows.map(r=>r.join(';'))].join('\n');
  const el=document.createElement('a');el.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);el.download='реестр_БО_'+new Date().toISOString().split('T')[0]+'.csv';el.click();
}
function expPdf(){
  const apps=getA();const dt=new Date();
  const mn=dt.toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
  const stats=monthStats();const pct=stats.total>0?Math.round(stats.posted/stats.total*100):100;
  const over=apps.filter(a=>a.status==='work'&&a.perv_bo==='Да'&&(wds(a.date_gk)||0)>=6).length;
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><style>body{font-family:Arial,sans-serif;font-size:13px;color:#0f172a;padding:40px;max-width:800px;margin:0 auto}h1{font-size:20px;font-weight:700;margin-bottom:4px}.sub{color:#64748b;font-size:12px;margin-bottom:24px}.kpi{display:flex;gap:16px;margin-bottom:24px}.kc{flex:1;border:1px solid #e2e8f0;border-radius:14px;padding:12px;text-align:center}.kl{font-size:10px;color:#94a3b8;font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}.kv{font-size:24px;font-weight:800}table{width:100%;border-collapse:collapse;font-size:12px;margin-top:16px}th{background:#f8fafc;text-align:left;padding:8px 10px;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;border-bottom:1px solid #e2e8f0}td{padding:8px 10px;border-bottom:1px solid #f1f5f9}.footer{margin-top:32px;padding-top:16px;border-top:1px solid #e2e8f0;font-size:11px;color:#94a3b8}${over>0?'.wb{background:#fef2f2;border:1px solid #fecaca;border-radius:14px;padding:12px;margin-bottom:16px;color:#991b1b;font-size:12px}':''}</style></head><body>
  <h1>Отчёт по постановке БО на учёт</h1>
  <div class="sub">ГКУ МО ДЗКС · ${dt.toLocaleDateString('ru-RU',{day:'numeric',month:'long',year:'numeric'})} · ${mn}</div>
  ${over>0?`<div class="wb">⚠ Нарушений срока: ${over} · ст. 15.15.7 КоАП РФ · штраф 10–30 тыс. руб.</div>`:''}
  <div class="kpi">
    <div class="kc"><div class="kl">Всего заявок</div><div class="kv">${apps.length}</div></div>
    <div class="kc"><div class="kl">Поставлено</div><div class="kv" style="color:#15803d">${apps.filter(a=>a.status==='posted').length}</div></div>
    <div class="kc"><div class="kl">На контроле ФО</div><div class="kv" style="color:#0e7490">${apps.filter(a=>a.status==='control').length}</div></div>
    <div class="kc"><div class="kl">Просрочено</div><div class="kv" style="color:#dc2626">${over}</div></div>
    <div class="kc"><div class="kl">Исполнено в срок</div><div class="kv" style="color:#15803d">${pct}%</div></div>
  </div>
  <table><thead><tr><th>Заявка</th><th>ДС</th><th>Создал</th><th>Тип</th><th>Статус</th><th>Предмет контракта</th></tr></thead>
  <tbody>${apps.map(a=>`<tr><td>${esc(a.num)}</td><td>${esc(a.num_ds)}</td><td>${esc(a.created_by_name)}</td><td>${a.perv_bo==='Да'?'Первичный ГК':'ДС'}</td><td>${SL[a.status]||a.status}</td><td>${esc(a.pred_k||'—')}</td></tr>`).join('')}</tbody></table>
  <div class="footer">Сформировано: ${dt.toLocaleString('ru-RU')} · п. 2.6 Порядка МЭФ МО № 23РВ-97 · Цифровая платформа ГКУ МО ДЗКС</div>
  </body></html>`;
  const w=window.open('','_blank');w.document.write(html);w.document.close();setTimeout(()=>w.print(),500);
}

getU();getA();restoreSession();render();
</script>
