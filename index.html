</style>

let CU=null,PAGE='dash',MODAL=null,EXP_ID=null,FILTER='all',SEARCH='',FF=[];
let _u=null,_a=null;

function getU(){if(_u)return _u;try{_u=JSON.parse(localStorage.getItem('bo_v1_users')||'null');}catch{}if(!_u)_u=[{id:1,name:'Смирнова А.В.',login:'admin',password:'admin',role:'admin',department:'Бухгалтерия',position:'Начальник отдела учёта'},{id:2,name:'Иванов И.И.',login:'ivanov',password:'1234',role:'contract',department:'Договорной отдел',position:'Договорник'},{id:3,name:'Петрова А.С.',login:'petrova',password:'1234',role:'contract',department:'Договорной отдел',position:'Ведущий специалист'},{id:4,name:'Козлов Д.Р.',login:'kozlov',password:'1234',role:'economist',department:'Планово-экономический отдел',position:'Экономист'},{id:5,name:'Генеральный директор',login:'director',password:'director',role:'director',department:'Руководство',position:'Генеральный директор'}];return _u;}

function getA(){if(_a)return _a;try{_a=JSON.parse(localStorage.getItem('bo_v1_apps')||'null');}catch{}if(!_a){const t=new Date(),d4=new Date(t),d7=new Date(t),d1=new Date(t);d4.setDate(t.getDate()-4);d7.setDate(t.getDate()-7);d1.setDate(t.getDate()-1);_a=[{id:1001,num:'1/'+YEAR,created_by:2,created_by_name:'Иванов И.И.',date_created:d7.toISOString(),num_ds:'ДС-19/26',date_ds:'2026-04-03',num_k:'К-77/2026',easuz:'3200001456789000663',perv_bo:'Да',date_gk:d7.toISOString().split('T')[0],pred_ds:'Изменение сроков и условий исполнения',pred_k:'Выполнение строительно-монтажных работ',summa:'4 750 000',kbk:'902 0702 15E0113970 244',kosgu:'225',kontragent:'ООО "СтройМонтаж"',sogl:'Приложен',mvk:'Приложен',rasp:'Приложен',files:[],status:'posted',history:[{dt:d7.toISOString(),user:'Иванов И.И.',action:'Заявка создана',comment:''},{dt:d4.toISOString(),user:'Смирнова А.В.',action:'Отправлено в ФО',comment:''},{dt:d1.toISOString(),user:'Смирнова А.В.',action:'Поставлено на учёт',comment:'Принято МЭФ без замечаний'}],rejection_reason:''},{id:1002,num:'2/'+YEAR,created_by:3,created_by_name:'Петрова А.С.',date_created:d4.toISOString(),num_ds:'ДС-20/26',date_ds:'2026-04-13',num_k:'К-45/2026',easuz:'3200001456789000778',perv_bo:'Нет',date_gk:d4.toISOString().split('T')[0],pred_ds:'Изменение цены контракта',pred_k:'Капитальный ремонт МДОУ №14 г. Люберцы',summa:'12 300 000',kbk:'902 0702 15E0213970 244',kosgu:'225',kontragent:'АО "РемСтрой"',sogl:'Приложен',mvk:'Не требуется',rasp:'Не требуется',files:[],status:'rejected',history:[{dt:d4.toISOString(),user:'Петрова А.С.',action:'Заявка создана',comment:''},{dt:new Date(d4.getTime()+86400000).toISOString(),user:'Смирнова А.В.',action:'Отправлено в ФО',comment:''},{dt:d1.toISOString(),user:'Смирнова А.В.',action:'Отклонено ФО',comment:'Неверная ЦСР'}],rejection_reason:'Неверная ЦСР (целевая статья расходов)'},{id:1003,num:'3/'+YEAR,created_by:2,created_by_name:'Иванов И.И.',date_created:d1.toISOString(),num_ds:'ДС-21/26',date_ds:'2026-04-16',num_k:'К-88/2026',easuz:'3200001456789000891',perv_bo:'Да',date_gk:d1.toISOString().split('T')[0],pred_ds:'Продление срока исполнения',pred_k:'Поставка медицинского оборудования',summa:'8 900 000',kbk:'902 0902 15E0313970 244',kosgu:'340',kontragent:'ООО "МедТех"',sogl:'Приложен',mvk:'Приложен',rasp:'Не требуется',files:[],status:'control',history:[{dt:d1.toISOString(),user:'Иванов И.И.',action:'Заявка создана',comment:''},{dt:t.toISOString(),user:'Смирнова А.В.',action:'Отправлено в ФО',comment:''}],rejection_reason:''}];}return _a;}

function save(){localStorage.setItem('bo_v1_users',JSON.stringify(getU()));localStorage.setItem('bo_v1_apps',JSON.stringify(getA()));}
function isHol(d){const dt=new Date(d);dt.setHours(12);const day=dt.getDay();if(day===0||day===6)return true;return RU_HOLIDAYS.has(dt.toISOString().split('T')[0]);}
function wds(ds){if(!ds)return null;const s=new Date(ds);s.setHours(0,0,0,0);const t=new Date();t.setHours(0,0,0,0);if(t<=s)return 0;let n=0,c=new Date(s);c.setDate(c.getDate()+1);while(c<=t){if(!isHol(c))n++;c.setDate(c.getDate()+1);}return n;}

function ni(){return new Date().toISOString();}

      <div class="fg"><label>Дата регистрации ГК</label><input type="date" id="f-gk" value="${v('date_gk')}" oninput="ugkp()"/></div>
    </div>
    <div style="margin-top:8px" id="gkp">${app&&app.date_gk?`<span style="font-size:13px;color:#64748b">Срок: </span>${dl}`:''}</div>
    <div class="sec">Финансовые реквизиты</div>
    <div class="g4">
      <div class="fg"><label>Сумма (руб.)</label><input id="f-sm" value="${v('summa')}" placeholder="4 750 000"/></div>
      <div class="fg"><label>КБК</label><input id="f-kb" value="${v('kbk')}" placeholder="902 0702 15E0113970 244"/></div>
      <div class="fg"><label>КОСГУ</label><input id="f-ko" value="${v('kosgu')}" placeholder="225"/></div>
      <div class="fg"><label>Контрагент</label><input id="f-kt" value="${v('kontragent')}" placeholder='ООО "СтройМонтаж"'/></div>
    </div>
    <div class="sec">Предмет</div>
    <div class="g2">
      <div class="fg"><label>Предмет дополнительного соглашения</label><input id="f-pd" value="${v('pred_ds')}" placeholder="Изменение сроков и условий исполнения"/></div>
      <div class="fg"><label>Предмет контракта</label><input id="f-pk" value="${v('pred_k')}" placeholder="Выполнение строительно-монтажных работ"/></div>
    </div>
    <div class="sec">Документы</div>
    <div class="g3">
      <div class="fg"><label>Согл</label><select id="f-sg"><option${(app?app.sogl:'')==='Не требуется'?' selected':''}>Не требуется</option><option${(app?app.sogl:'')==='Приложен'?' selected':''}>Приложен</option></select></div>
      <div class="fg"><label>МВК</label><select id="f-mv"><option${(app?app.mvk:'')==='Не требуется'?' selected':''}>Не требуется</option><option${(app?app.mvk:'')==='Приложен'?' selected':''}>Приложен</option></select></div>
      <div class="fg"><label>Распоряжение</label><select id="f-rp"><option${(app?app.rasp:'')==='Не требуется'?' selected':''}>Не требуется</option><option${(app?app.rasp:'')==='Приложен'?' selected':''}>Приложен</option></select></div>
    </div>
    <div class="sec">Файлы (PDF, DOC, DOCX)</div>
    <div style="margin-bottom:10px">
      <input type="file" id="fi" accept=".pdf,.doc,.docx,.xlsx" multiple style="display:none" onchange="hf(this.files)"/>
      <button class="btns" onclick="document.getElementById('fi').click()">Прикрепить файлы</button>
      <span style="font-size:12px;color:#94a3b8;margin-left:10px">Макс. 1MB на файл</span>
    </div>
    <div class="fl" id="fl">${fh}</div>
    <div style="border-top:1px solid #f1f5f9;margin-top:1.5rem;padding-top:1.25rem;display:flex;gap:8px">
      <button class="btnp" onclick="svf(${eid||'null'})">${app?'Сохранить изменения':'Создать заявку'}</button>
      <button class="btns" onclick="gp('reg')">Отмена</button>
      ${app&&CU.role==='admin'?`<button class="btn-r" style="margin-left:auto" onclick="if(confirm('Удалить заявку?')){delA(${eid})}">Удалить</button>`:''}
    </div>
  </div>`;}

function rUsers(){
  return`<div class="ph"><div><div class="pt">Пользователи</div><div class="ps">Управление доступом</div></div><button class="btnp" onclick="sm('newUser',null)">+ Добавить</button></div>
  <div class="card" style="overflow:hidden;padding:0"><table>
    <thead><tr><th>Сотрудник</th><th>Логин</th><th>Роль</th><th>Отдел</th><th>Должность</th><th></th></tr></thead>
    <tbody>${getU().map(u=>`<tr>
      <td><div style="display:flex;align-items:center;gap:10px"><div style="width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#fff;flex-shrink:0">${ini(u.name)}</div><span style="font-weight:600">${esc(u.name)}</span></div></td>
      <td style="font-size:13px;color:#64748b">${esc(u.login)}</td>
      <td>${bdg(RL[u.role]||u.role,u.role==='admin'?'d':u.role==='director'?'w':u.role==='contract'?'b':'n')}</td>
      <td style="font-size:13px">${esc(u.department||'—')}</td>
      <td style="font-size:13px">${esc(u.position||'—')}</td>
      <td><button class="btns" style="font-size:12px;padding:5px 12px" onclick="sm('editUser',${u.id})">Изменить</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`;}

function rDir(){
  const apps=getA();
  const t3=top3();const mc=['t3-1','t3-2','t3-3'];
  const prob=apps.filter(a=>a.status==='rejected'||(a.status==='work'&&wds(a.date_gk)>=4));
  const mn=new Date().toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
  return`<div class="ph"><div><div class="pt">Дашборд руководителя</div><div class="ps">${new Date().toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div></div>
  <div class="mg">
    <div class="mc mc-v"><div class="ml">Всего заявок</div><div class="mv">${apps.length}</div></div>
    <div class="mc mc-g"><div class="ml">Поставлено</div><div class="mv" style="color:#15803d">${apps.filter(a=>a.status==='posted').length}</div></div>
    <div class="mc mc-b"><div class="ml">На контроле ФО</div><div class="mv" style="color:#0369a1">${apps.filter(a=>a.status==='control').length}</div></div>
    <div class="mc mc-r"><div class="ml">Проблемных</div><div class="mv" style="color:#b91c1c">${prob.length}</div></div>
  </div>
  ${prob.length>0?`<div style="margin-bottom:16px">
    <div style="font-size:16px;font-weight:800;color:#b91c1c;margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      Заблокированные платежи
    </div>
    ${prob.map(a=>{const c=di(a);return`<div class="db">
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><div style="font-size:15px;font-weight:800">${esc(a.num)} · ${esc(a.num_ds||'—')}</div>
        <div style="font-size:13px;color:#64748b;margin-top:3px">${esc(a.pred_k||a.num_k||'—')} · ${esc(a.kontragent||'—')}</div>
        <div style="font-size:12px;color:#94a3b8;margin-top:2px">Создал: ${esc(a.created_by_name)}</div></div>
        ${a.summa?`<div style="font-size:19px;font-weight:800;color:#b91c1c;white-space:nowrap">${esc(a.summa)} руб.</div>`:''}
      </div>
      ${a.status==='rejected'?`<div class="dr">Отклонено ФО: ${esc(a.rejection_reason||'Не указана')}</div>`:''}
      ${a.status==='work'&&wds(a.date_gk)>=6?`<div class="dr" style="background:#fefce8;border-color:#fde68a;color:#92400e">Просрочено на ${wds(a.date_gk)-5} р.д. — штрафные риски</div>`:''}
    </div>`}).join('')}
  </div>`:`<div class="alert alert-s" style="margin-bottom:16px">Нет заблокированных платежей</div>`}
  <div class="card card-body">
    <div class="sec" style="margin-top:0">Топ-3 договорника · ${mn}</div>
    <div class="t3w">
      ${t3.length===0?'<div style="color:#94a3b8;font-size:14px">Заявок в этом месяце пока нет</div>':t3.map((x,i)=>`<div class="t3c ${mc[i]}"><div class="t3r">${['#1 Лидер','#2 Место','#3 Место'][i]}</div><div class="t3n">${esc(x.u.name)}</div><div class="t3d">${esc(x.u.position)}</div><div class="t3v">${x.n}</div><div class="t3l">заявок в месяце</div></div>`).join('')}
      ${t3.length<3?Array(3-t3.length).fill(0).map((_,i)=>`<div class="t3c t3-2" style="opacity:.3"><div class="t3r">#${t3.length+i+1} Место</div><div class="t3n" style="color:#94a3b8">Пусто</div></div>`).join(''):''}
    </div>
  </div>`;}

function rModal(){
  const{type,data}=MODAL;const app=data?getA().find(a=>a.id===data):null;let c='';
  if(type==='sendControl')c=`<div class="mtitle">Отправить в ФО</div><div class="alert alert-b">Заявка ${esc(app?.num)} будет переведена в статус "На контроле ФО".</div><div style="display:flex;gap:8px;margin-top:1rem"><button class="btn-b" onclick="dSC(${data})">Подтвердить</button><button class="btns" onclick="cm()">Отмена</button></div>`;
  if(type==='accept')c=`<div class="mtitle">Принять — Поставлено</div><div class="alert alert-s">Заявка ${esc(app?.num)} будет поставлена на учёт.</div><div class="fg" style="margin-bottom:1rem"><label>Комментарий</label><textarea id="mc" placeholder="Принято без замечаний"></textarea></div><div style="display:flex;gap:8px"><button class="btn-g" onclick="dA(${data})">Принять</button><button class="btns" onclick="cm()">Отмена</button></div>`;
  if(type==='reject')c=`<div class="mtitle">Отклонить заявку</div><div class="alert alert-d">Причина будет видна договорнику и руководителю.</div><div class="fg" style="margin-bottom:10px"><label>Шаблон причины</label><select id="mt" onchange="document.getElementById('mr').value=this.value==='Другое'?'':this.value"><option value="">— Выберите —</option>${RT.map(t=>`<option>${esc(t)}</option>`).join('')}</select></div><div class="fg" style="margin-bottom:1rem"><label>Причина (обязательно)</label><textarea id="mr" rows="3" placeholder="Укажите причину..."></textarea></div><div style="display:flex;gap:8px"><button class="btn-r" onclick="dR(${data})">Отклонить</button><button class="btns" onclick="cm()">Отмена</button></div>`;
  if(type==='rollback')c=`<div class="mtitle">Откатить заявку</div><div class="alert alert-w">Заявка вернётся в статус "В работе". Договорник сможет внести исправления.</div><div class="fg" style="margin-bottom:1rem"><label>Причина отката (обязательно)</label><textarea id="mrb" rows="3" placeholder="Например: ошибка в КБК..."></textarea></div><div style="display:flex;gap:8px"><button class="btn-w" onclick="dRb(${data})">Откатить</button><button class="btns" onclick="cm()">Отмена</button></div>`;
  if(type==='newUser'||type==='editUser'){const u=type==='editUser'?getU().find(x=>x.id===data):null;const uv=k=>u?esc(u[k]||''):'';c=`<div class="mtitle">${u?'Редактировать':'Новый пользователь'}</div><div class="g2" style="margin-bottom:10px"><div class="fg"><label>ФИО</label><input id="un" value="${uv('name')}" placeholder="Иванов Иван Иванович"/></div><div class="fg"><label>Логин</label><input id="ul" value="${uv('login')}" placeholder="ivanov"/></div></div><div class="g2" style="margin-bottom:10px"><div class="fg"><label>Пароль${u?' (пусто — не менять)':''}</label><input type="password" id="up" placeholder="${u?'Новый пароль':'Пароль'}"/></div><div class="fg"><label>Роль</label><select id="ur">${['admin','contract','economist','director'].map(r=>`<option value="${r}"${(u?.role||'contract')===r?' selected':''}>${RL[r]}</option>`).join('')}</select></div></div><div class="g2" style="margin-bottom:1.25rem"><div class="fg"><label>Отдел</label><input id="ud" value="${uv('department')}" placeholder="Договорной отдел"/></div><div class="fg"><label>Должность</label><input id="upos" value="${uv('position')}" placeholder="Ведущий специалист"/></div></div><div style="display:flex;gap:8px"><button class="btnp" onclick="dSU(${u?u.id:'null'})">${u?'Сохранить':'Добавить'}</button><button class="btns" onclick="cm()">Отмена</button>${u&&u.id!==CU.id?`<button class="btn-r" style="margin-left:auto" onclick="if(confirm('Удалить?')){dDU(${u.id})}">Удалить</button>`:''}</div>`;}
  return`<div class="mbg" onclick="if(event.target===this)cm()"><div class="modal">${c}</div></div>`;}

// Actions
function doLogin(){const l=(document.getElementById('li-login').value||'').trim();const p=document.getElementById('li-pass').value;const u=getU().find(u=>u.login===l&&u.password===p);if(!u){const e=document.getElementById('lerr');e.style.display='block';e.textContent='Неверный логин или пароль';return;}CU=u;FF=[];PAGE=u.role==='director'?'director':u.role==='economist'?'reg':'dash';render();}
function logout(){CU=null;PAGE='dash';MODAL=null;EXP_ID=null;SEARCH='';FILTER='all';FF=[];render();}
function gp(p){if(p==='form-new')FF=[];PAGE=p;EXP_ID=null;render();}
function sf(f){FILTER=f;render();}
function ss(v){SEARCH=v;render();}
function te(id){EXP_ID=EXP_ID===id?null:id;render();}
function sm(t,d){MODAL={type:t,data:d};render();}
function cm(){MODAL=null;render();}
function ugkp(){const dg=document.getElementById('f-gk').value;const el=document.getElementById('gkp');if(!el)return;if(!dg){el.innerHTML='';return;}const d=di({date_gk:dg,status:'work'});el.innerHTML=`<span style="font-size:13px;color:#64748b">Срок: </span>${bdg(d.l,d.t)}`;}
function hf(fl){Array.from(fl).forEach(f=>{if(f.size>1024*1024){alert(`Файл "${f.name}" слишком большой (макс. 1MB)`);return;}const r=new FileReader();r.onload=e=>{FF.push({name:f.name,type:f.type,size:f.size,data:e.target.result});const el=document.getElementById('fl');if(el)el.innerHTML=FF.map((x,i)=>`<div class="fc">${esc(x.name)}<span style="color:#94a3b8;font-size:11px">(${Math.round(x.size/1024)}KB)</span><span class="frm" onclick="rmf(${i})">×</span></div>`).join('');};r.readAsDataURL(f);});document.getElementById('fi').value='';}
function rmf(i){FF.splice(i,1);const el=document.getElementById('fl');if(el)el.innerHTML=FF.map((f,idx)=>`<div class="fc">${esc(f.name)}<span style="color:#94a3b8;font-size:11px">(${Math.round(f.size/1024)}KB)</span><span class="frm" onclick="rmf(${idx})">×</span></div>`).join('');}
function g(id){return(document.getElementById(id)||{}).value||'';}
function svf(eid){
  const data={num_ds:g('f-nd'),date_ds:g('f-dd'),num_k:g('f-nk'),easuz:g('f-ea'),perv_bo:g('f-pb'),date_gk:g('f-gk'),pred_ds:g('f-pd'),pred_k:g('f-pk'),summa:g('f-sm'),kbk:g('f-kb'),kosgu:g('f-ko'),kontragent:g('f-kt'),sogl:g('f-sg'),mvk:g('f-mv'),rasp:g('f-rp'),files:[...FF]};
  const apps=getA();
  if(eid){const idx=apps.findIndex(a=>a.id===eid);if(idx>=0){const o=apps[idx];Object.assign(o,data);ah(o,'Заявка отредактирована');if(o.status==='rejected'){o.status='work';o.rejection_reason='';ah(o,'Возвращено в работу','После исправления');}}}
  else{const a={...data,id:Date.now(),num:nn(),created_by:CU.id,created_by_name:CU.name,date_created:ni(),status:'work',rejection_reason:'',history:[]};ah(a,'Заявка создана');apps.push(a);}
  save();FF=[];PAGE='reg';EXP_ID=null;render();}
function dSC(id){const a=getA().find(x=>x.id===id);if(!a)return;a.status='control';ah(a,'Отправлено в ФО','Документы направлены в МЭФ через ГИС РЭБЕ');save();cm();}
function dA(id){const a=getA().find(x=>x.id===id);if(!a)return;a.status='posted';ah(a,'Поставлено на учёт',(document.getElementById('mc')||{}).value||'Принято МЭФ');save();cm();}
function dR(id){const r=(document.getElementById('mr')||{}).value||'';if(!r.trim()){alert('Укажите причину');return;}const a=getA().find(x=>x.id===id);if(!a)return;a.status='rejected';a.rejection_reason=r;ah(a,'Отклонено ФО',r);save();cm();}
function dRb(id){const r=(document.getElementById('mrb')||{}).value||'';if(!r.trim()){alert('Укажите причину');return;}const a=getA().find(x=>x.id===id);if(!a)return;const p=SL[a.status]||a.status;a.status='work';a.rejection_reason='';ah(a,`Откатано из "${p}"`,r);save();cm();}
function dSU(eid){const n=g('un'),l=g('ul'),p=g('up'),r=g('ur'),d=g('ud'),pos=g('upos');if(!n||!l){alert('Заполните ФИО и логин');return;}const us=getU();if(eid){const u=us.find(x=>x.id===eid);if(u){u.name=n;u.login=l;if(p)u.password=p;u.role=r;u.department=d;u.position=pos;}}else{if(!p){alert('Укажите пароль');return;}if(us.find(u=>u.login===l)){alert('Логин уже занят');return;}us.push({id:Date.now(),name:n,login:l,password:p,role:r,department:d,position:pos});}save();cm();}
function dDU(id){_u=getU().filter(u=>u.id!==id);save();cm();}
function delA(id){_a=getA().filter(a=>a.id!==id);save();FF=[];PAGE='reg';render();}
function expXls(){const apps=getA();const BOM='\uFEFF';const h=['Номер','Создал','Дата','Статус','Номер ДС','Дата ДС','Контракт','ЕАСУЗ','Первичное БО','Дата ГК','Контрагент','Сумма','КБК','КОСГУ','Предмет ДС','Предмет контракта','Согл','МВК','Распоряжение','Причина отклонения'];const rows=apps.map(a=>[a.num,a.created_by_name,new Date(a.date_created).toLocaleDateString('ru-RU'),SL[a.status]||a.status,a.num_ds,a.date_ds,a.num_k,a.easuz,a.perv_bo,a.date_gk,a.kontragent,a.summa,a.kbk,a.kosgu,a.pred_ds,a.pred_k,a.sogl,a.mvk,a.rasp,a.rejection_reason].map(v=>'"'+(v||'').replace(/"/g,'""')+'"'));const csv=BOM+[h.join(';'),...rows.map(r=>r.join(';'))].join('\n');const el=document.createElement('a');el.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);el.download='реестр_БО_'+new Date().toISOString().split('T')[0]+'.csv';el.click();}

getU();getA();render();
</script>
</body>
</html>
