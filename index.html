function ni(){return new Date().toISOString();}
function tm(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;}
function nn(){const a=getA();if(!a.length)return'1/'+YEAR;return(Math.max(...a.map(x=>parseInt(x.num)||0))+1)+'/'+YEAR;}
function ah(app,action,comment=''){if(!app.history)app.history=[];app.history.push({dt:ni(),user:CU.name,action,comment});}
function ini(n){return(n||'').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();}
function top3(){const m=tm();return getU().filter(u=>u.role==='contract').map(u=>({u,n:getA().filter(a=>a.created_by===u.id&&(a.date_created||'').slice(0,7)===m).length})).filter(x=>x.n>0).sort((a,b)=>b.n-a.n).slice(0,3);}

const SVGS={
  dash:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
  reg:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>',
  ctrl:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
  plus:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  users:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
  warn:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
  dir:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>'
};

function render(){
  if(!CU){document.getElementById('app').innerHTML=rLogin();setTimeout(()=>{const p=document.getElementById('lp');if(p)p.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});},0);return;}
  document.getElementById('app').innerHTML=`<div class="app">${rSb()}<div class="main">${rPage()}</div></div>${MODAL?rModal():''}`;
}

function rLogin(){return`<div class="lw"><div class="lc">
  <div class="li"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
  <div class="lt">Реестр постановки БО</div>
  <div class="ls">ГКУ МО ДЗКС · Система сопровождения ДС и контрактов</div>
  <div id="lerr" class="al ald" style="display:none"></div>
  <div class="fg" style="margin-bottom:11px"><label>Логин</label><input id="ll" placeholder="Введите логин"/></div>
  <div class="fg" style="margin-bottom:1.375rem"><label>Пароль</label><input type="password" id="lp" placeholder="Введите пароль"/></div>
  <button class="btnp" style="width:100%;padding:11px;font-size:15px" onclick="doLogin()">Войти</button>
  <div style="text-align:center;font-size:12px;color:#9ca3af;margin-top:1rem">Для получения доступа обратитесь к администратору</div>
</div></div>`;}

function rSb(){
  const nav=bNav();
  return`<div class="sb">
    <div class="sb-top"><div class="sb-org">ГКУ МО ДЗКС</div><div class="sb-name">Реестр БО</div><div class="sb-sub">Постановка и контроль</div></div>
    <nav class="sb-nav">${nav.map(x=>x==='---'?`<div class="sb-sec">Управление</div>`:`<div class="sb-a ${PAGE===x.p?'on':''} ${x.red?'red':''}" onclick="gp('${x.p}')">${SVGS[x.ic]||''} ${x.l}</div>`).join('')}</nav>
    <div class="sb-foot">
      <div class="sb-uw"><div class="sb-av">${ini(CU.name)}</div><div><div class="sb-un">${esc(CU.name.split(' ').slice(0,2).join(' '))}</div><div class="sb-ur">${RL[CU.role]||CU.role}</div></div></div>
      <button class="sb-out" onclick="logout()">Выйти из системы</button>
    </div>
  </div>`;}

function bNav(){
  const r=CU.role;
  if(r==='director')return[{p:'director',l:'Дашборд',ic:'dir'}];
  if(r==='economist')return[{p:'reg',l:'Реестр заявок',ic:'reg'}];
  const it=[{p:'dash',l:'Дашборд',ic:'dash'},{p:'ctrl',l:'Контроль сроков',ic:'ctrl'},{p:'reg',l:'Реестр заявок',ic:'reg'}];
  if(r==='admin'||r==='contract')it.push({p:'form-new',l:'Новая заявка',ic:'plus'});
  if(r==='admin'){it.push('---');it.push({p:'users',l:'Пользователи',ic:'users'});}
  if(r==='contract'){const n=getA().filter(a=>a.created_by===CU.id&&a.status==='rejected').length;if(n>0)it.push({p:'my-rej',l:`Отклонено (${n})`,ic:'warn',red:true});}
  return it;
}

function rPage(){
  if(PAGE==='director')return rDir();
  if(PAGE==='users')return CU.role==='admin'?rUsers():'';
  if(PAGE==='ctrl')return rCtrl();
  if(PAGE==='form-new')return rForm(null);
  if(PAGE&&PAGE.startsWith('form-edit-'))return rForm(parseInt(PAGE.split('-')[2]));
  if(PAGE==='my-rej')return rMyRej();
  if(PAGE==='reg')return rReg();
  return rDash();
}

// ── DASHBOARD ──
function rDash(){
  const apps=getA(),ma=CU.role==='contract'?apps.filter(a=>a.created_by===CU.id):apps;
  const posted=ma.filter(a=>a.status==='posted').length,ctrl=ma.filter(a=>a.status==='control').length;
  const over=ma.filter(a=>a.status==='work'&&a.perv_bo==='Да'&&wds(a.date_gk)>=6).length;
  const prob=apps.map(a=>({a,d:dli(a)})).filter(x=>x.d.t==='r'||x.d.t==='y').sort((a,b)=>a.d.t==='r'?-1:1);
  const t3=top3();const dt=new Date();
  const mn=dt.toLocaleDateString('ru-RU',{month:'long',year:'numeric'});
  return`<div class="ph"><div><div class="pt">Дашборд</div><div class="ps">${dt.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'})} · ${dt.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}</div></div></div>
  <div class="mg">
    <div class="mc mcb"><div class="ml">Всего заявок</div><div class="mv">${ma.length}</div></div>
    <div class="mc mcg"><div class="ml">Поставлено</div><div class="mv" style="color:#16a34a">${posted}</div></div>
    <div class="mc mcs"><div class="ml">На контроле ФО</div><div class="mv" style="color:#0891b2">${ctrl}</div></div>
    <div class="mc mcr"><div class="ml">Просрочено</div><div class="mv" style="color:#dc2626">${over}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
    <div class="card cb">
      <div class="sec" style="margin-top:0">Требуют внимания</div>
      ${prob.length===0?'<div style="color:#9ca3af;font-size:13px;padding:.5rem 0">Нет просрочек и рисков</div>':prob.slice(0,5).map(({a,d})=>`
        <div style="padding:9px 0;border-bottom:1px solid #f9fafb">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px">
            <span style="font-weight:700;color:#2563eb;cursor:pointer;font-size:13px" onclick="gp('reg');EXP_ID=${a.id};render()">${esc(a.num)} · ${esc(a.num_ds)}</span>${bdg(d.l,d.t)}
          </div>
          <div style="font-size:12px;color:#9ca3af">${esc(a.created_by_name)}${a.pred_k?' · '+esc(a.pred_k.slice(0,50))+(a.pred_k.length>50?'…':''):''}</div>
          ${a.status==='rejected'?`<div style="font-size:12px;color:#dc2626;margin-top:2px">${esc(a.rejection_reason)}</div>`:''}
        </div>`).join('')}
    </div>
    <div class="card cb">
      <div class="sec" style="margin-top:0">Отклонено ФО</div>
      ${apps.filter(a=>a.status==='rejected').length===0?'<div style="color:#9ca3af;font-size:13px">Нет отклонённых заявок</div>':
        apps.filter(a=>a.status==='rejected').map(a=>`<div style="padding:8px 11px;background:#fef2f2;border-radius:8px;margin-bottom:6px;border:1px solid #fecaca">
          <div style="font-size:13px;font-weight:700">${esc(a.num)} · ${esc(a.num_ds)}</div>
          <div style="font-size:12px;color:#991b1b;margin-top:2px">${esc(a.rejection_reason||'—')}</div>
          <div style="font-size:11px;color:#9ca3af;margin-top:1px">${esc(a.created_by_name)}</div>
        </div>`).join('')}
    </div>
  </div>
  <div class="card cb">
    <div class="sec" style="margin-top:0">Топ-3 договорника · ${mn}</div>
    <div style="font-size:12px;color:#9ca3af;margin-bottom:10px">По количеству заявок, созданных в этом месяце</div>
    <div class="t3">
      ${t3.length===0?'<div style="color:#9ca3af;font-size:13px">Заявок в этом месяце ещё нет</div>':t3.map((x,i)=>`
        <div class="t3c ${['t31','t32','t33'][i]}">
          <div class="t3r">${['#1 Лидер','#2 Место','#3 Место'][i]}</div>
          <div class="t3n">${esc(x.u.name)}</div>
          <div class="t3d">${esc(x.u.position)}</div>
          <div class="t3v">${x.n}</div>
          <div class="t3l">заявок в месяце</div>
        </div>`).join('')}
      ${t3.length<3?Array(3-t3.length).fill(0).map((_,i)=>`<div class="t3c t32" style="opacity:.3"><div class="t3r">#${t3.length+i+1}</div><div class="t3n" style="color:#9ca3af">Пусто</div></div>`).join(''):''}
    </div>
  </div>`;}

// ── CONTROL DASHBOARD ──
function rCtrl(){
  const apps=getA();
  const gk=apps.filter(a=>a.perv_bo==='Да');
  const ds=apps.filter(a=>a.perv_bo==='Нет');

  function tls(list){
    const ok=list.filter(a=>['posted','control'].includes(a.status)||(!['rejected'].includes(a.status)&&(wds(a.date_gk)||0)<4)).length;
    const risk=list.filter(a=>a.status==='work'&&(wds(a.date_gk)||0)>=4&&(wds(a.date_gk)||0)<6).length;
    const over=list.filter(a=>a.status==='work'&&(wds(a.date_gk)||0)>=6).length;
    return{ok,risk,over};
  }

  function visibleList(list){
    return list.filter(a=>{
      const d=dli(a);
      return d.t==='r'||d.t==='y';
    });
  }

  function appRow(a){
    const d=dli(a);
    return`<div class="cr ${d.cls}">
      <div class="cr-num" style="font-size:13px;font-weight:700">${esc(a.num)}</div>
      <div class="cr-ds" style="font-size:12px;color:#6b7280">${esc(a.num_ds)}</div>
      <div class="cr-sub">${esc(a.pred_k||a.pred_ds||'—')}</div>
      <div style="font-size:11px;color:#6b7280;min-width:80px;text-align:right">${esc(a.created_by_name.split(' ')[0])}</div>
      ${bdg(d.l,d.t)}
    </div>`;
  }

  function block(title,list,emptyText){
    const stats=tls(list);
    const visible=visibleList(list);
    return `<div style="margin-bottom:1.5rem">
      <div class="sh"><div class="sh-title">${title} (${list.length})</div></div>
      <div class="tl" style="margin-bottom:14px">
        <div class="tlb tlr"><div class="tln">Просрочено</div><div class="tlv">${stats.over}</div></div>
        <div class="tlb tly"><div class="tln">Риск срока</div><div class="tlv">${stats.risk}</div></div>
        <div class="tlb tlg"><div class="tln">В срок / Готово</div><div class="tlv">${stats.ok}</div></div>
      </div>
      ${visible.length===0?`<div style="color:#9ca3af;font-size:13px;padding:.5rem 0">${emptyText}</div>`:visible.map(appRow).join('')}
    </div>`;
  }

  return`<div class="ph"><div><div class="pt">Контроль сроков</div><div class="ps">Дедлайн: 6 рабочих дней с даты регистрации ГК</div></div></div>
    ${block('Первичные государственные контракты',gk,'Нет просроченных и рисковых заявок по первичным ГК')}
    ${block('Дополнительные соглашения',ds,'Нет просроченных и рисковых заявок по ДС')}`;}

// ── REGISTRY ──
function rReg(){
  const apps=getA();
  const fil=apps.filter(a=>{
    if(CU.role==='contract'&&a.created_by!==CU.id)return false;
    if(FILTER!=='all'&&a.status!==FILTER)return false;
    if(!SEARCH)return true;
    const q=SEARCH.toLowerCase();
    return[a.num,a.num_ds,a.num_k,a.eis,a.easuz,a.created_by_name].some(v=>(v||'').toLowerCase().includes(q));
  }).sort((a,b)=>new Date(b.date_created)-new Date(a.date_created));
  const fc=k=>apps.filter(a=>a.status===k).length;
  return`<div class="ph">
    <div><div class="pt">Реестр заявок</div><div class="ps">Постановка на учёт · 6 рабочих дней</div></div>
    <div style="display:flex;gap:8px">
      ${CU.role==='admin'||CU.role==='contract'?`<button class="btnp" onclick="gp('form-new')">+ Новая заявка</button>`:''}
      ${CU.role==='admin'?`<button class="btns" onclick="expCsv()">Экспорт</button>`:''}
    </div>
  </div>
  <div class="fb">${[{k:'all',l:`Все (${apps.length})`},{k:'work',l:`В работе (${fc('work')})`},{k:'control',l:`На контроле ФО (${fc('control')})`},{k:'posted',l:`Поставлено (${fc('posted')})`},{k:'rejected',l:`Отклонено (${fc('rejected')})`}].map(f=>`<button class="fbn ${FILTER===f.k?'on':''}" onclick="sf('${f.k}')">${f.l}</button>`).join('')}</div>
  <div class="card" style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:9px;padding:9px 14px">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input style="border:none;background:transparent;flex:1;font-size:14px;outline:none;font-family:'Inter',inherit;color:#111827" placeholder="Поиск по номеру заявки, ДС, контракту, ЕАСУЗ, ЕИС..." value="${esc(SEARCH)}" oninput="ss(this.value)"/>
  </div></div>
  <div class="card" style="overflow:hidden;padding:0"><table>
    <thead><tr><th style="width:8px"></th><th>Заявка</th>${CU.role!=='contract'?'<th>Создал</th>':''}<th>ДС / Контракт</th><th>ЕАСУЗ / ЕИС</th><th>Тип</th><th>Статус</th><th>Срок</th><th></th></tr></thead>
    <tbody>${fil.length===0?`<tr><td colspan="9" style="text-align:center;padding:2.5rem;color:#9ca3af">Нет заявок</td></tr>`:fil.flatMap(app=>{
      const d=dli(app);const ex=EXP_ID===app.id;
      const rows=[`<tr class="trh" onclick="te(${app.id})">
        <td>${dot(d.t)}</td>
        <td><div style="font-weight:700">${esc(app.num)}</div><div style="font-size:11px;color:#9ca3af">${new Date(app.date_created).toLocaleDateString('ru-RU')}</div></td>
        ${CU.role!=='contract'?`<td style="font-size:12px;color:#6b7280">${esc(app.created_by_name)}</td>`:''}
        <td><div style="font-size:13px;font-weight:500">${esc(app.num_ds)}</div><div style="font-size:11px;color:#9ca3af;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(app.num_k||'—')}</div></td>
        <td><div style="font-size:11px;color:#6b7280">${esc(app.easuz||'—')}</div><div style="font-size:11px;color:#9ca3af">${esc(app.eis||'—')}</div></td>
        <td>${bdg(app.perv_bo==='Да'?'Первичный ГК':'ДС',app.perv_bo==='Да'?'b':'n')}</td>
        <td><div style="display:flex;flex-wrap:wrap;gap:3px">${bdg(SL[app.status]||app.status,ST[app.status]||'n')}${app.status==='rejected'?bdg('Правка','r'):''}</div></td>
        <td>${bdg(d.l,d.t)}</td>
        <td><button class="btns" style="font-size:11px;padding:4px 10px" onclick="event.stopPropagation();te(${app.id})">${ex?'↑':'↓'}</button></td>
      </tr>`];
      if(ex)rows.push(rDet(app));
      return rows;
    }).join('')}</tbody>
  </table></div>`;}

function rDet(app){
  const cE=CU.role==='admin'||(CU.role==='contract'&&app.created_by===CU.id&&app.status==='work');
  const cS=CU.role==='admin'&&app.status==='work';
  const cA=CU.role==='admin'&&app.status==='control';
  const cR=CU.role==='admin'&&app.status==='control';
  const cRb=CU.role==='admin'&&(app.status==='control'||app.status==='posted'||app.status==='rejected');
  const hist=(app.history||[]).slice().reverse().map(h=>`<div class="hi"><div style="display:flex;justify-content:space-between;align-items:flex-start"><span style="font-weight:600">${esc(h.action)}</span><span class="hd">${fdt(h.dt)}</span></div><div style="color:#6b7280;font-size:12px">${esc(h.user)}${h.comment?' · '+esc(h.comment):''}</div></div>`).join('');
  const fh=(app.files||[]).length===0?'<span style="font-size:13px;color:#9ca3af">Файлы не приложены</span>':`<div class="fl">${app.files.map(f=>`<div class="fc"><a href="${f.data}" download="${esc(f.name)}">${esc(f.name)}</a><span style="color:#9ca3af;font-size:11px">(${Math.round(f.size/1024)}KB)</span></div>`).join('')}</div>`;
  return`<tr><td colspan="9" style="padding:0 13px 13px"><div class="det">
    ${app.status==='rejected'?`<div class="al ald">Причина отклонения ФО: <strong>${esc(app.rejection_reason)}</strong></div>`:''}
    <div class="dg">
      <div><div class="dl">Номер ДС</div><div class="dv">${esc(fmt(app.num_ds))}</div></div>
      <div><div class="dl">Дата ДС</div><div class="dv">${esc(fmt(app.date_ds))}</div></div>
      <div><div class="dl">Тип</div><div class="dv">${esc(app.perv_bo==='Да'?'Первичный ГК':'Дополнительное соглашение')}</div></div>
      <div><div class="dl">Номер контракта</div><div class="dv" style="font-size:12px">${esc(fmt(app.num_k))}</div></div>
      <div><div class="dl">ЕАСУЗ</div><div class="dv">${esc(fmt(app.easuz))}</div></div>
      <div><div class="dl">ЕИС</div><div class="dv" style="font-size:12px">${esc(fmt(app.eis))}</div></div>
      <div><div class="dl">Дата ГК</div><div class="dv">${esc(fmt(app.date_gk))}</div></div>
      <div><div class="dl">Создал</div><div class="dv">${esc(fmt(app.created_by_name))}</div></div>
    </div>
    ${app.pred_ds?`<div style="margin-bottom:8px"><div class="dl">Предмет ДС</div><div class="dv">${esc(app.pred_ds)}</div></div>`:''}
    ${app.pred_k?`<div style="margin-bottom:12px"><div class="dl">Предмет контракта</div><div class="dv">${esc(app.pred_k)}</div></div>`:''}
    <div style="display:flex;gap:14px;flex-wrap:wrap;margin-bottom:12px">
      ${[['sogl','Согл'],['mvk','МВК'],['rasp','Распоряжение'],['bg','Банковская гарантия']].map(([k,l])=>`<span style="font-size:12px;color:#6b7280">${l}: ${bdg(app[k]||'—',app[k]==='Приложен'?'g':'n')}</span>`).join('')}
    </div>
    <div style="margin-bottom:14px"><div class="dl" style="margin-bottom:5px">Прикреплённые файлы</div>${fh}</div>
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px">
      ${cE?`<button class="btns" onclick="gp('form-edit-${app.id}')">Редактировать</button>`:''}
      ${cS?`<button class="btn-b" onclick="sm('sendCtrl',${app.id})">Отправить в ФО</button>`:''}
      ${cA?`<button class="btn-g" onclick="sm('accept',${app.id})">Принять</button>`:''}
      ${cR?`<button class="btn-r" onclick="sm('reject',${app.id})">Отклонить</button>`:''}
      ${cRb?`<button class="btn-w" onclick="sm('rollback',${app.id})">Откатить</button>`:''}
    </div>
    ${hist?`<div class="sec" style="margin-top:0">История</div>${hist}`:''}
  </div></td></tr>`;}

function rMyRej(){
  const apps=getA().filter(a=>a.created_by===CU.id&&a.status==='rejected');
  return`<div class="ph"><div><div class="pt">Отклонённые заявки</div><div class="ps">Требуют исправления</div></div></div>

// ── ACTIONS ──
function doLogin(){const l=(document.getElementById('ll').value||'').trim();const p=(document.getElementById('lp')||{}).value||'';const u=getU().find(u=>u.login===l&&u.password===p);if(!u){const e=document.getElementById('lerr');e.style.display='block';e.textContent='Неверный логин или пароль';return;}CU=u;FF=[];PAGE=u.role==='director'?'director':u.role==='economist'?'reg':'dash';render();}
function logout(){CU=null;PAGE='dash';MODAL=null;EXP_ID=null;SEARCH='';FILTER='all';FF=[];render();}
function gp(p){if(p==='form-new')FF=[];PAGE=p;EXP_ID=null;render();}
function sf(f){FILTER=f;render();}
function ss(v){SEARCH=v;render();}
function te(id){EXP_ID=EXP_ID===id?null:id;render();}
function sm(t,d){MODAL={type:t,data:d};render();}
function cm(){MODAL=null;render();}
function gv(id){return(document.getElementById(id)||{}).value||'';}

function toggleGK(){
  const pb=document.getElementById('f-pb');
  const gk=document.getElementById('f-gk');
  const row=document.getElementById('gk-row');
  if(!pb||!gk||!row)return;
  const isYes=pb.value==='Да';
  gk.disabled=!isYes;
  row.style.opacity=isYes?'1':'0.4';
  if(!isYes){gk.value='';document.getElementById('gkp').innerHTML='';}
}

function ugkp(){
  const dg=gv('f-gk');const el=document.getElementById('gkp');if(!el)return;
  if(!dg){el.innerHTML='';return;}
  const d=dli({date_gk:dg,status:'work',perv_bo:'Да'});
  el.innerHTML=`<span style="font-size:12px;color:#6b7280">Срок: </span>${bdg(d.l,d.t)}`;
}

function hf(fl){Array.from(fl).forEach(f=>{if(f.size>1024*1024){alert(`Файл "${f.name}" слишком большой (макс. 1MB)`);return;}const r=new FileReader();r.onload=e=>{FF.push({name:f.name,type:f.type,size:f.size,data:e.target.result});const el=document.getElementById('fl');if(el)el.innerHTML=FF.map((x,i)=>`<div class="fc">${esc(x.name)}<span style="color:#9ca3af;font-size:11px">(${Math.round(x.size/1024)}KB)</span><span class="frm" onclick="rmf(${i})">×</span></div>`).join('');};r.readAsDataURL(f);});document.getElementById('fi').value='';}
function rmf(i){FF.splice(i,1);const el=document.getElementById('fl');if(el)el.innerHTML=FF.map((f,idx)=>`<div class="fc">${esc(f.name)}<span style="color:#9ca3af;font-size:11px">(${Math.round(f.size/1024)}KB)</span><span class="frm" onclick="rmf(${idx})">×</span></div>`).join('');}

function svf(eid){
  const pb=gv('f-pb');const isGK=pb==='Да';
  const data={num_ds:gv('f-nd'),date_ds:gv('f-dd'),num_k:gv('f-nk'),eis:gv('f-eis'),easuz:gv('f-ea'),perv_bo:pb,date_gk:isGK?gv('f-gk'):'',pred_ds:gv('f-pd'),pred_k:gv('f-pk'),sogl:gv('f-sg'),mvk:gv('f-mv'),rasp:gv('f-rp'),bg:gv('f-bg'),files:[...FF]};
  const apps=getA();
  if(eid){const idx=apps.findIndex(a=>a.id===eid);if(idx>=0){const o=apps[idx];Object.assign(o,data);ah(o,'Заявка отредактирована');if(o.status==='rejected'){o.status='work';o.rejection_reason='';ah(o,'Возвращено в работу','После исправления');}}}
  else{const a={...data,id:Date.now(),num:nn(),created_by:CU.id,created_by_name:CU.name,date_created:ni(),status:'work',rejection_reason:'',history:[]};ah(a,'Заявка создана');apps.push(a);}
  save();FF=[];PAGE='reg';EXP_ID=null;render();}

function dSC(id){const a=getA().find(x=>x.id===id);if(!a)return;a.status='control';ah(a,'Отправлено в ФО','Направлено в МЭФ через ГИС РЭБЕ');save();cm();}
function dA(id){const a=getA().find(x=>x.id===id);if(!a)return;a.status='posted';ah(a,'Поставлено на учёт',gv('mc')||'Принято МЭФ');save();cm();}
function dR(id){const r=gv('mr');if(!r.trim()){alert('Укажите причину');return;}const a=getA().find(x=>x.id===id);if(!a)return;a.status='rejected';a.rejection_reason=r;ah(a,'Отклонено ФО',r);save();cm();}
function dRb(id){const r=gv('mrb');if(!r.trim()){alert('Укажите причину');return;}const a=getA().find(x=>x.id===id);if(!a)return;const p=SL[a.status]||a.status;a.status='work';a.rejection_reason='';ah(a,`Откатано из "${p}"`,r);save();cm();}
function dSU(eid){const n=gv('un'),l=gv('ul'),p=gv('up'),r=gv('ur'),d=gv('ud'),pos=gv('upos');if(!n||!l){alert('Заполните ФИО и логин');return;}const us=getU();if(eid){const u=us.find(x=>x.id===eid);if(u){u.name=n;u.login=l;if(p)u.password=p;u.role=r;u.department=d;u.position=pos;}}else{if(!p){alert('Укажите пароль');return;}if(us.find(u=>u.login===l)){alert('Логин уже занят');return;}us.push({id:Date.now(),name:n,login:l,password:p,role:r,department:d,position:pos});}save();cm();}
function dDU(id){_u=getU().filter(u=>u.id!==id);save();cm();}
function delA(id){_a=getA().filter(a=>a.id!==id);save();FF=[];PAGE='reg';render();}

function expCsv(){
  const apps=getA();const BOM='\uFEFF';
  const h=['Номер','Создал','Дата','Статус','Тип','Номер ДС','Дата ДС','Контракт','ЕИС','ЕАСУЗ','Первичное БО','Дата ГК','Предмет ДС','Предмет контракта','Согл','МВК','Распоряжение','Банковская гарантия','Причина отклонения'];
  const rows=apps.map(a=>[a.num,a.created_by_name,new Date(a.date_created).toLocaleDateString('ru-RU'),SL[a.status]||a.status,a.perv_bo==='Да'?'Первичный ГК':'ДС',a.num_ds,a.date_ds,a.num_k,a.eis,a.easuz,a.perv_bo,a.date_gk,a.pred_ds,a.pred_k,a.sogl,a.mvk,a.rasp,a.bg,a.rejection_reason].map(v=>'"'+(v||'').replace(/"/g,'""')+'"'));
  const csv=BOM+[h.join(';'),...rows.map(r=>r.join(';'))].join('\n');
  const el=document.createElement('a');el.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);el.download='реестр_БО_'+new Date().toISOString().split('T')[0]+'.csv';el.click();}

getU();getA();render();
</script>
